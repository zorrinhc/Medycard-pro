<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  /* Family palette */
  --f-bg:#FAF7F2;
  --f-card:#FFFFFF;
  --f-pri:#1A3A3A;
  --f-sec:#4A6A6A;
  --f-muted:#8A9A9A;
  --f-teal:#0D7C6E;
  --f-teal2:#E8F5F3;
  --f-amber:#D4860A;
  --f-amber2:#FEF3E2;
  --f-rose:#C0414A;
  --f-rose2:#FEF0F1;
  --f-sky:#1B6CA8;
  --f-sky2:#EBF4FD;
  --f-border:#E8E2D8;
  --f-shadow:rgba(26,58,58,0.08);
  /* RN palette */
  --r-bg:#0A1628;
  --r-card:#0F2040;
  --r-card2:#162A4A;
  --r-pri:#FFFFFF;
  --r-sec:rgba(255,255,255,0.75);
  --r-muted:rgba(255,255,255,0.4);
  --r-blue:#3B82F6;
  --r-blue2:rgba(59,130,246,0.15);
  --r-teal:#0D9488;
  --r-teal2:rgba(13,148,136,0.15);
  --r-green:#22C55E;
  --r-green2:rgba(34,197,94,0.12);
  --r-amber:#F59E0B;
  --r-amber2:rgba(245,158,11,0.12);
  --r-red:#EF4444;
  --r-red2:rgba(239,68,68,0.12);
  --r-purple:#A855F7;
  --r-purple2:rgba(168,85,247,0.12);
  --r-border:rgba(255,255,255,0.08);
  --r-border2:rgba(59,130,246,0.25);
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;}
#app{height:100%;overflow:hidden;}
.page{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;}
/* ── FAMILY STYLES ── */
.f-page{background:var(--f-bg);}
.f-topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(250,247,242,0.95);
  backdrop-filter:blur(12px);
  padding:calc(var(--sat) + 12px) 20px 12px;
  border-bottom:1px solid var(--f-border);
  display:flex;align-items:center;gap:12px;
  font-family:'DM Sans',sans-serif;
}
.f-topbar h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--f-pri);flex:1;text-align:center;}
.f-topbar .back-btn{
  width:36px;height:36px;border-radius:50%;background:var(--f-border);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:21px;color:var(--f-sec);flex-shrink:0;
}
.f-topbar .placeholder{width:36px;flex-shrink:0;}
.f-body{padding:16px 20px calc(var(--sab) + 80px);}
.f-card{
  background:var(--f-card);border-radius:18px;
  box-shadow:0 2px 12px var(--f-shadow);
  border:1px solid var(--f-border);
  padding:18px;margin-bottom:12px;
}
.f-card-teal{background:var(--f-teal2);border:1.5px solid rgba(13,124,110,0.2);}
.f-card-amber{background:var(--f-amber2);border:1.5px solid rgba(212,134,10,0.2);}
.f-card-rose{background:var(--f-rose2);border:1.5px solid rgba(192,65,74,0.2);}
.f-card-sky{background:var(--f-sky2);border:1.5px solid rgba(27,108,168,0.2);}
.f-label{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--f-muted);margin-bottom:6px;}
.f-title{font-family:'Playfair Display',serif;font-size:25px;color:var(--f-pri);margin-bottom:6px;line-height:1.3;}
.f-body-text{font-size:18px;color:var(--f-sec);line-height:1.7;}
.f-small{font-size:17px;color:var(--f-muted);line-height:1.6;}
.f-tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:50px;font-size:15px;font-weight:600;margin:3px;}
.f-btn{
  width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:19px;font-weight:600;
  transition:transform .1s,opacity .1s;
}
.f-btn:active{transform:scale(.98);opacity:.9;}
.f-btn-primary{background:var(--f-teal);color:white;}
.f-btn-outline{background:transparent;border:2px solid var(--f-border);color:var(--f-sec);}
.f-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(250,247,242,0.97);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--f-border);
  padding:8px 0 calc(var(--sab) + 6px);
  display:flex;
}
.f-nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:6px 0;
  font-family:'DM Sans',sans-serif;
}
.f-nav-btn span:first-child{font-size:25px;}
.f-nav-btn span:last-child{font-size:13px;font-weight:600;color:var(--f-muted);}
.f-nav-btn.on span:last-child{color:var(--f-teal);}
.f-nav-btn.on span:first-child{filter:none;}
/* ── RN STYLES ── */
.r-page{background:var(--r-bg);}
.r-topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(10,22,40,0.97);
  backdrop-filter:blur(12px);
  padding:calc(var(--sat) + 12px) 20px 12px;
  border-bottom:1px solid var(--r-border);
  display:flex;align-items:center;gap:12px;
}
.r-topbar h1{font-family:'DM Sans',sans-serif;font-size:21px;font-weight:700;color:var(--r-pri);flex:1;text-align:center;}
.r-topbar .back-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--r-card2);border:1px solid var(--r-border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:21px;color:var(--r-sec);flex-shrink:0;
}
.r-topbar .placeholder{width:36px;flex-shrink:0;}
.r-body{padding:16px 16px calc(var(--sab) + 80px);}
.r-card{
  background:var(--r-card);border-radius:14px;
  border:1px solid var(--r-border);
  padding:16px;margin-bottom:10px;
}
.r-card-blue{background:var(--r-blue2);border:1px solid var(--r-border2);}
.r-card-teal{background:var(--r-teal2);border:1px solid rgba(13,148,136,0.25);}
.r-card-amber{background:var(--r-amber2);border:1px solid rgba(245,158,11,0.2);}
.r-card-red{background:var(--r-red2);border:1px solid rgba(239,68,68,0.2);}
.r-card-green{background:var(--r-green2);border:1px solid rgba(34,197,94,0.2);}
.r-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--r-muted);margin-bottom:5px;}
.r-title{font-family:'DM Sans',sans-serif;font-size:24px;font-weight:700;color:var(--r-pri);margin-bottom:4px;}
.r-body-text{font-size:17px;color:var(--r-sec);line-height:1.65;}
.r-mono{font-family:'DM Mono',monospace;font-size:17px;color:var(--r-blue);}
.r-btn{
  padding:12px 16px;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;
  transition:transform .1s,opacity .1s;
}
.r-btn:active{transform:scale(.98);}
.r-btn-blue{background:var(--r-blue);color:white;}
.r-btn-full{width:100%;}
.r-btn-teal{background:var(--r-teal);color:white;}
.r-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,22,40,0.97);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--r-border);
  padding:8px 0 calc(var(--sab) + 6px);
  display:flex;
}
.r-nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:6px 0;
  font-family:'DM Sans',sans-serif;
}
.r-nav-btn span:first-child{font-size:24px;}
.r-nav-btn span:last-child{font-size:13px;font-weight:600;color:var(--r-muted);}
.r-nav-btn.on span:last-child{color:var(--r-blue);}
/* ── SHARED ── */
.row{display:flex;gap:10px;}
.col{flex:1;}
input,textarea,select{
  font-family:'DM Sans',sans-serif;
  outline:none;
}
.chip{
  display:inline-flex;padding:6px 14px;border-radius:50px;
  font-size:17px;font-weight:600;cursor:pointer;
  border:2px solid transparent;transition:all .15s;
}
.divider{height:1px;background:var(--f-border);margin:12px 0;}
.r-divider{height:1px;background:var(--r-border);margin:10px 0;}
/* ── SCORE DISPLAY ── */
.score-ring{
  width:80px;height:80px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;flex-shrink:0;
  border:3px solid currentColor;
}
.score-ring .num{font-size:30px;font-weight:700;line-height:1;}
.score-ring .lbl{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
/* ── SCALE FORM INPUTS ── */
.scale-opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 14px;border-radius:12px;
  background:var(--r-card2);border:1.5px solid var(--r-border);
  cursor:pointer;margin-bottom:7px;transition:border-color .15s,background .15s;
}
.scale-opt.sel{background:var(--r-blue2);border-color:var(--r-blue);}
.scale-opt-num{
  width:26px;height:26px;border-radius:8px;
  background:var(--r-card);border:1.5px solid var(--r-border);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:17px;font-weight:600;
  color:var(--r-muted);flex-shrink:0;margin-top:1px;
}
.scale-opt.sel .scale-opt-num{background:var(--r-blue);border-color:var(--r-blue);color:white;}
.scale-opt-text{flex:1;}
.scale-opt-label{font-size:17px;font-weight:600;color:var(--r-pri);}
.scale-opt-sub{font-size:15px;color:var(--r-muted);line-height:1.5;margin-top:2px;}
/* ── FADE ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.fadeUp{animation:fadeUp .3s ease both;}
/* ── SBAR ── */
.sbar-section{
  border-left:3px solid;padding:12px 14px;border-radius:0 12px 12px 0;
  background:var(--r-card2);margin-bottom:10px;
}
.sbar-label{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;}
.sbar-result{
  background:var(--r-bg);border:1px solid var(--r-border2);
  border-radius:12px;padding:16px;font-size:17px;
  color:var(--r-sec);line-height:1.8;white-space:pre-wrap;
  font-family:'DM Mono',monospace;
}
/* ── CALC ── */
.calc-input{
  width:100%;padding:12px 14px;border-radius:10px;
  background:var(--r-card2);border:1.5px solid var(--r-border);
  color:var(--r-pri);font-size:19px;
}
.calc-input:focus{border-color:var(--r-blue);}
.calc-result{
  background:var(--r-blue2);border:1px solid var(--r-border2);
  border-radius:12px;padding:16px;text-align:center;margin-top:12px;
}
.calc-result .big{font-size:40px;font-weight:700;color:var(--r-blue);font-family:'DM Mono',monospace;}
.calc-result .unit{font-size:17px;color:var(--r-sec);margin-top:4px;}
/* ── MODE SELECT ── */
.mode-select-page{
  min-height:100%;
  background:linear-gradient(160deg,#0A1628 0%,#0D2B40 50%,#0A1628 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--sat) + 30px) 24px calc(var(--sab) + 30px);
}
/* ── SYMPTOM SCALE ── */
.sym-slider{width:100%;margin:10px 0;}
.pain-dots{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.pain-dot{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;cursor:pointer;border:2px solid transparent;
  transition:transform .1s;
}
.pain-dot.sel{transform:scale(1.2);border-color:white;}
/* ── EMERGENCY ── */
.emerg-page{
  background:linear-gradient(180deg,#1A0A0A 0%,#2A0D0D 100%);
  min-height:100%;padding:calc(var(--sat) + 20px) 20px calc(var(--sab) + 20px);
}
.emerg-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);
  border-radius:50px;padding:4px 14px;font-size:15px;font-weight:700;
  color:#FCA5A5;text-transform:uppercase;letter-spacing:.08em;
}
/* ── PROFILE SETUP ── */
.setup-page{
  background:var(--f-bg);min-height:100%;
  padding:calc(var(--sat) + 20px) 20px calc(var(--sab) + 20px);
}
.f-input{
  width:100%;padding:13px 16px;border-radius:12px;
  background:white;border:1.5px solid var(--f-border);
  color:var(--f-pri);font-size:19px;margin-bottom:4px;
}
.f-input:focus{border-color:var(--f-teal);}
.f-input-label{font-size:17px;font-weight:600;color:var(--f-sec);margin-bottom:6px;display:block;}
.f-input-group{margin-bottom:14px;}
/* Scrollbar hide */
::-webkit-scrollbar{display:none;}
</style>
<script>
// ── ICON GENERATOR ──────────────────────────────────────────────────────────
(function(){
  var c=document.createElement('canvas');
  c.width=512;c.height=512;
  var x=c.getContext('2d');

  function rr(ctx,rx,ry,rw,rh,rad){
    ctx.beginPath();
    ctx.moveTo(rx+rad,ry);
    ctx.lineTo(rx+rw-rad,ry);ctx.arcTo(rx+rw,ry,rx+rw,ry+rad,rad);
    ctx.lineTo(rx+rw,ry+rh-rad);ctx.arcTo(rx+rw,ry+rh,rx+rw-rad,ry+rh,rad);
    ctx.lineTo(rx+rad,ry+rh);ctx.arcTo(rx,ry+rh,rx,ry+rh-rad,rad);
    ctx.lineTo(rx,ry+rad);ctx.arcTo(rx,ry,rx+rad,ry,rad);
    ctx.closePath();
  }

  // Rich navy-to-blue gradient background
  var bg=x.createLinearGradient(0,0,512,512);
  bg.addColorStop(0,'#060F1E');
  bg.addColorStop(0.6,'#0D2448');
  bg.addColorStop(1,'#1A3A7A');
  x.fillStyle=bg;
  rr(x,0,0,512,512,100);
  x.fill();

  // Glowing circle behind cross
  var glow=x.createRadialGradient(256,210,0,256,210,160);
  glow.addColorStop(0,'rgba(59,130,246,0.35)');
  glow.addColorStop(1,'rgba(59,130,246,0)');
  x.fillStyle=glow;
  x.beginPath();x.arc(256,210,160,0,Math.PI*2);x.fill();

  // Medical cross — bold and centered higher up
  var cx=256, cy=205, arm=100, thick=48, cr=18;
  x.fillStyle='white';
  x.shadowColor='rgba(147,197,253,0.6)';
  x.shadowBlur=30;
  rr(x,cx-arm,cy-thick/2,arm*2,thick,cr); x.fill();
  rr(x,cx-thick/2,cy-arm,thick,arm*2,cr); x.fill();
  x.shadowBlur=0;

  // Separator line
  x.strokeStyle='rgba(255,255,255,0.15)';
  x.lineWidth=2;
  x.beginPath();
  x.moveTo(156,330);x.lineTo(356,330);
  x.stroke();

  // "RN" — large, bold, white
  x.font='800 96px -apple-system,Arial,sans-serif';
  x.fillStyle='white';
  x.textAlign='center';
  x.textBaseline='middle';
  x.fillText('RN',256,390);

  var dataUrl=c.toDataURL('image/png');
  var link=document.createElement('link');
  link.rel='icon';link.type='image/png';link.href=dataUrl;
  document.head.appendChild(link);
  var al=document.createElement('link');
  al.rel='apple-touch-icon';al.href=dataUrl;
  document.head.appendChild(al);
})();
</script>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
var S = {
  screen: "mode-select",
  mode: null,        // "family" | "rn"
  hist: ["mode-select"],
  // Patient profile
  patient: JSON.parse(localStorage.getItem("cp_patient") || "null") || {
    name: "Your Loved One",
    dob: "",
    diagnoses: ["Dementia / Alzheimer's"],
    medications: ["Donepezil 10mg daily","Memantine 10mg BID"],
    allergies: ["Penicillin","Sulfa drugs"],
    codeStatus: "DNR / Comfort Care",
    preferredHospital: "",
    physician: "",
    emergencyContacts: [{name:"",phone:"",relation:""}]
  },
  profileSetupDone: localStorage.getItem("cp_profileDone") === "1",
  // Family state
  fTab: "home",
  fSymptoms: JSON.parse(localStorage.getItem("cp_symptoms") || "[]"),
  fSymEntry: {pain:0,confusion:0,breathing:0,appetite:0,sleep:0,notes:""},
  fSymToday: false,
  openCondition: null,
  openMed: null,
  // RN state
  rTab: "scales",
  rScale: null,      // active scale id
  rScoreState: {},   // scale entry state
  rScores: JSON.parse(localStorage.getItem("cp_rscores") || "[]"),
  sbarData: {situation:"",background:"",assessment:"",recommendation:""},
  sbarResult: "",
  calcTab: "drip",
  calcVals: {},
  // SBAR auto-fill
  sbarAutoFill: false,
};

function go(s){ S.hist.push(s); S.screen=s; render(); scrollTop(); }
function back(){ if(S.hist.length>1){S.hist.pop(); S.screen=S.hist[S.hist.length-1]; render(); scrollTop();} }
function scrollTop(){ var p=document.querySelector(".page"); if(p) p.scrollTop=0; }
function save(key,val){ try{localStorage.setItem(key,JSON.stringify(val));}catch(e){} }
function nm(){ return S.patient.name && S.patient.name !== "Your Loved One" ? S.patient.name : "your loved one"; }

// ═══════════════════════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════════════════════
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="class") e.className=attrs[k];
    else if(k==="style") e.style.cssText=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children){
    if(typeof children==="string") e.textContent=children;
    else if(Array.isArray(children)) children.forEach(function(c){if(c) e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
    else if(children instanceof Node) e.appendChild(children);
  }
  return e;
}
function div(cls,style){ var e=document.createElement("div"); if(cls) e.className=cls; if(style) e.style.cssText=style; return e; }
function p(cls){ var e=document.createElement("p"); if(cls) e.className=cls; return e; }
function span(cls,text){ var e=document.createElement("span"); if(cls) e.className=cls; if(text) e.textContent=text; return e; }
function btn(cls,text,onclick){ var b=document.createElement("button"); b.className=cls; b.textContent=text; if(onclick) b.addEventListener("click",onclick); return b; }
function inp(cls,placeholder,val,oninput){
  var i=document.createElement("input"); i.className=cls; i.placeholder=placeholder||""; i.value=val||"";
  if(oninput) i.addEventListener("input",oninput); return i;
}
function ta(cls,placeholder,val,oninput){
  var t=document.createElement("textarea"); t.className=cls; t.placeholder=placeholder||""; t.value=val||""; t.rows=3;
  t.style.cssText="resize:none;width:100%;";
  if(oninput) t.addEventListener("input",oninput); return t;
}
function add(parent,child){ if(child) parent.appendChild(typeof child==="string"?document.createTextNode(child):child); return parent; }
function addAll(parent,children){ children.forEach(function(c){if(c) add(parent,c);}); return parent; }

// ═══════════════════════════════════════════════════════
//  RENDER ROUTER
// ═══════════════════════════════════════════════════════
function render(){
  try {
    var app=document.getElementById("app");
    app.innerHTML="";
    var page=document.createElement("div");
    page.className="page";
    if(S.screen==="mode-select") renderModeSelect(page);
    else if(S.screen==="profile-setup") renderProfileSetup(page);
    else if(S.screen==="emergency") renderEmergency(page);
    else if(S.mode==="family") renderFamily(page);
    else if(S.mode==="rn") renderRN(page);
    app.appendChild(page);
  } catch(e) {
    var app2=document.getElementById("app");
    var errDiv=document.createElement("div");
    errDiv.style.cssText="padding:40px 20px;color:white;font-family:monospace;background:#1a0a0a;min-height:100%";
    var em=document.createElement("p"); em.innerHTML="<strong style='color:#f87171'>Error: </strong>"+e.message;
    var rb=document.createElement("button");
    rb.textContent="Back to Start";
    rb.style.cssText="margin-top:16px;padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:17px;display:block;";
    rb.onclick=function(){S.screen="mode-select";S.mode=null;render();};
    errDiv.appendChild(em);errDiv.appendChild(rb);app2.appendChild(errDiv);
  }
}

// ═══════════════════════════════════════════════════════
//  MODE SELECT
// ═══════════════════════════════════════════════════════
function renderModeSelect(page){
  var wrap=div("mode-select-page");
  // Logo
  var logo=div("","text-align:center;margin-bottom:40px;");
  logo.innerHTML=`
  <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
    <div style="width:90px;height:90px;border-radius:26px;background:linear-gradient(145deg,#0A1628,#1D4ED8);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(29,78,216,.4);">
      <svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="8" width="10" height="34" rx="5" fill="white"/>
        <rect x="8" y="20" width="34" height="10" rx="5" fill="white"/>
      </svg>
    </div>
    <div style="font-family:'Playfair Display',serif;font-size:38px;font-weight:700;color:white;letter-spacing:-.5px;line-height:1;">CarePath</div>
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.25);border:1px solid rgba(59,130,246,.4);border-radius:50px;padding:4px 16px;margin-top:8px;">
      <span style="font-size:15px;font-weight:800;color:#93C5FD;letter-spacing:.12em;">RN</span>
      <span style="width:3px;height:3px;border-radius:50%;background:rgba(147,197,253,.4);display:inline-block;"></span>
      <span style="font-size:13px;color:rgba(147,197,253,.8);font-weight:600;">Registered Nurse Edition</span>
    </div>
    <div style="font-size:16px;color:rgba(255,255,255,.4);margin-top:10px;font-style:italic;">Clinical clarity. Family comfort.</div>
  </div>
`;
  add(wrap,logo);
  // Cards
  [{
    icon:"👨‍👩‍👧",title:"Family & Caregiver",sub:"Understand what\'s happening, what to expect, and how to help",
    bg:"linear-gradient(135deg,#0D7C6E,#1B6CA8)",screen:"family-home",mode:"family"
  },{
    icon:"👩‍⚕️",title:"RN / Clinician",sub:"Clinical scales, SBAR generator, calculators, and hospice tools",
    bg:"linear-gradient(135deg,#1D4ED8,#7C3AED)",screen:"rn-home",mode:"rn"
  }].forEach(function(c){
    var card=div("","background:"+c.bg+";border-radius:20px;padding:22px;margin-bottom:14px;cursor:pointer;");
    card.innerHTML='<div style="display:flex;align-items:center;gap:14px"><span style="font-size:40px">'+c.icon+'</span><div><div style="font-family:\'Playfair Display\',serif;font-size:25px;font-weight:600;color:white">'+c.title+'</div><div style="font-size:17px;color:rgba(255,255,255,.7);margin-top:4px;line-height:1.5">'+c.sub+'</div></div></div>';
    card.onclick=function(){
      S.mode=c.mode;
      if(!S.profileSetupDone && c.mode==="family"){ go("profile-setup"); return; }
      S.screen=c.screen; S.hist=[c.screen]; render();
    };
    add(wrap,card);
  });
  // Built by RN badge
  var badge=div("","text-align:center;margin-top:20px;");
  badge.innerHTML='<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:8px 18px;font-size:17px;color:rgba(255,255,255,.6)">✨ Designed by a Registered Nurse</div>';
  add(wrap,badge);
  add(page,wrap);
}

// ═══════════════════════════════════════════════════════
//  PROFILE SETUP
// ═══════════════════════════════════════════════════════
function renderProfileSetup(page){
  var wrap=div("setup-page");
  var hdr=div("","padding-bottom:20px;border-bottom:1px solid var(--f-border);margin-bottom:20px;");
  hdr.innerHTML='<div style="font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--f-teal);margin-bottom:6px">Welcome to CarePath RN</div><div style="font-family:\'Playfair Display\',serif;font-size:32px;color:var(--f-pri);line-height:1.3;margin-bottom:8px">Tell us about your loved one</div><div style="font-size:17px;color:var(--f-sec);line-height:1.65">This information helps us personalize everything for you. You can always update it later.</div>';
  add(wrap,hdr);
  function ig(label,child){ var g=div("f-input-group"); add(g,el("label",{"class":"f-input-label"},label)); add(g,child); return g; }
  var nameInp=inp("f-input","e.g. Margaret Johnson",S.patient.name==="Your Loved One"?"":S.patient.name,function(){S.patient.name=this.value||"Your Loved One";});
  var dobInp=inp("f-input","",S.patient.dob,function(){S.patient.dob=this.value;}); dobInp.type="date";
  var dxInp=inp("f-input","e.g. Dementia, Cancer, Heart Failure",S.patient.diagnoses.join(", "),function(){S.patient.diagnoses=this.value.split(",").map(function(s){return s.trim();}).filter(Boolean);});
  var physInp=inp("f-input","Dr. Smith",S.patient.physician,function(){S.patient.physician=this.value;});
  addAll(wrap,[
    ig("Patient Name",nameInp),
    ig("Date of Birth",dobInp),
    ig("Diagnoses (comma separated)",dxInp),
    ig("Primary Physician",physInp),
  ]);
  var saveBtn=btn("f-btn f-btn-primary","Save & Continue",function(){
    save("cp_patient",S.patient);
    S.profileSetupDone=true; localStorage.setItem("cp_profileDone","1");
    S.screen="family-home"; S.hist=["family-home"]; render();
  });
  saveBtn.style.marginTop="8px";
  add(wrap,saveBtn);
  var skip=btn("f-btn f-btn-outline","Skip for now",function(){
    S.profileSetupDone=true; localStorage.setItem("cp_profileDone","1");
    S.screen="family-home"; S.hist=["family-home"]; render();
  });
  skip.style.marginTop="10px";
  add(wrap,skip);
  add(page,wrap);
}
</script>
</body>
</html>
<script>
// ═══════════════════════════════════════════════════════
//  FAMILY MODE ROUTER
// ═══════════════════════════════════════════════════════
function renderFamily(page){
  page.className="page f-page";
  var screens={
    "family-home":renderFamilyHome,
    "family-hospice":renderFamilyHospice,
    "family-stages":renderFamilyStages,
    "family-glossary":renderFamilyGlossary,
    "family-conditions":renderFamilyConditions,
    "family-questions":renderFamilyQuestions,
    "family-passing":renderFamilyPassing,
    "family-medications":renderFamilyMedications,
    "family-symptoms":renderFamilySymptoms,
    "family-emergency":renderEmergency,
  };
  var fn=screens[S.screen];
  if(fn) fn(page); else renderFamilyHome(page);
}

function fTopBar(title,showBack){
  var bar=div("f-topbar");
  if(showBack) add(bar,btn("back-btn","←",back));
  else add(bar,div("placeholder"));
  add(bar,el("h1",null,title));
  var modeBtn=btn("back-btn","☰",function(){S.screen="mode-select";S.hist=["mode-select"];render();});
  modeBtn.title="Switch Mode"; add(bar,modeBtn);
  return bar;
}

// ── GLOSSARY ─────────────────────────────────────────────────
function renderFamilyGlossary(page){
  add(page,fTopBar("Medical Terms Explained",true));
  var body=div("f-body");
  var intro=div("","font-size:17px;color:var(--f-sec);line-height:1.65;margin-bottom:14px;"); intro.textContent="Every medical word translated into plain English. Tap any term to expand it."; add(body,intro);
  var terms=[
    {term:"FAST Scale",icon:"📋",plain:"A checklist doctors use to measure how advanced memory loss is. Stage 7 means the person needs help with almost everything and speaks very few words per day. Stage 7 is typically when hospice eligibility begins."},
    {term:"Hospice Care",icon:"🏥",plain:"Comfort-focused medical care for people near the end of life. The goal shifts from curing the illness to keeping the person comfortable, pain-free, and at home with family. Completely covered by Medicare."},
    {term:"Palliative Care",icon:"💊",plain:"Extra support to manage pain and symptoms at any stage of illness. Important difference from hospice: palliative care can happen alongside curative treatment. You do not have to be near the end of life to receive it."},
    {term:"Advance Directive",icon:"📄",plain:"A legal document where a person writes down their wishes for medical care if they can no longer speak for themselves. Also called a living will. Extremely important to have in place."},
    {term:"DNR / DNI",icon:"🚫",plain:"Do Not Resuscitate / Do Not Intubate. Instructions that if the heart stops or breathing stops, the medical team should not attempt CPR or place a breathing tube. These are choices the patient or family makes in advance."},
    {term:"Power of Attorney",icon:"✍️",plain:"A legal document giving someone the authority to make financial decisions (financial POA) or medical decisions (healthcare POA / healthcare proxy) for another person."},
    {term:"ADL",icon:"🚿",plain:"Activities of Daily Living — basic tasks like bathing, dressing, eating, toileting, and moving. Doctors track which ones a person can still do independently. Losing ADL function is a key hospice eligibility criterion."},
    {term:"Prognosis",icon:"📅",plain:"A doctor's best estimate of how a disease will progress. A 6-month prognosis means the doctor estimates the person has 6 months or less to live if the illness follows its normal course. This is required for hospice."},
    {term:"Aspiration Pneumonia",icon:"🫁",plain:"A lung infection caused by accidentally breathing food, liquid, or saliva into the lungs instead of swallowing it. Very common in late-stage dementia. It is one of the qualifying comorbidities for hospice."},
    {term:"Comorbidity",icon:"🔗",plain:"Having more than one health condition at the same time. For example, dementia plus recurrent pneumonia. Multiple comorbidities generally support hospice eligibility."},
    {term:"Cachexia",icon:"⚖️",plain:"Significant, unintentional weight loss that cannot be reversed by eating more. It is a sign that the body is no longer able to maintain itself. Weight loss of 10% or more in 6 months is a hospice criterion."},
    {term:"PPS (Palliative Performance Scale)",icon:"📉",plain:"A scale from 0-100% that measures how well a person can function. A score of 50% or below means the person spends most of the day in bed and needs significant help. This supports hospice eligibility."},
    {term:"Goals of Care",icon:"🎯",plain:"A conversation between the medical team and family about what the patient would want — whether to focus on aggressive treatment, quality of life, or comfort only. Often happens when a condition is not improving."},
    {term:"Medicare Hospice Benefit",icon:"💚",plain:"A Medicare program that pays for all hospice services including nursing visits, medications, equipment (hospital bed, wheelchair, oxygen), and family support — at no cost to the patient or family."},
  ];

      treatment:"There is currently no cure. Treatment focuses on managing symptoms, maintaining quality of life, and slowing progression. Medications like donepezil (Aricept) and memantine (Namenda) may help symptoms in earlier stages. In later stages, care becomes focused entirely on comfort.",
      warning:["Sudden worsening of confusion (may signal infection)","Fever or signs of infection — pneumonia is very common","Refusal to eat or drink for more than 24 hours","Signs of pain: grimacing, moaning, restlessness","Significant fall or injury","New inability to swallow safely"],

      expect:"Heart failure is a serious condition with significant impact on quality of life. Advanced heart failure (NYHA Class IV) means severe symptoms at rest. Hospice is appropriate when repeated hospitalizations are not improving the condition and the focus becomes comfort."},
    "COPD":{icon:"🫁",color:"#EA580C",
      what:"Chronic Obstructive Pulmonary Disease (COPD) is a progressive lung disease that makes it increasingly difficult to breathe. It includes emphysema and chronic bronchitis. Caused primarily by long-term smoking, it cannot be cured but can be managed.",

    "Renal Failure":{icon:"🩺",color:"#1B6CA8",
      what:"Chronic Kidney Disease (CKD) or renal failure means the kidneys can no longer filter waste products effectively from the blood. When kidney function falls below 15%, it is called end-stage renal disease (ESRD). Without dialysis or a transplant, waste builds up in the body.",
      treatment:"Treatment may include dialysis (a machine that filters the blood several times per week) or kidney transplant. For patients who choose not to pursue dialysis — or for whom it is no longer beneficial — conservative management focuses on symptom control and quality of life.",
      warning:["Unusual fatigue or drowsiness beyond baseline","Decreased urine output or no urine","Swelling in legs, feet, or face","Nausea, vomiting, or loss of appetite","Shortness of breath","Confusion or difficulty concentrating"],
      expect:"End-stage renal failure without dialysis progresses over weeks to months. Hospice provides expert management of symptoms including itching, nausea, breathlessness, and pain — allowing the person to remain comfortable at home or in a care setting of their choice."},
  };
  // Find matching conditions from patient profile

        secs.forEach(function(s){

          r.innerHTML='<span style="color:var(--f-rose);flex-shrink:0">•</span><span style="font-size:17px;color:var(--f-sec);line-height:1.5">'+w+'</span>';

var MED_DB={
  "donepezil":{"what":"Donepezil is a cholinesterase inhibitor that works by preventing the breakdown of acetylcholine, a chemical that helps nerve cells communicate. It helps maintain memory and cognitive function.","why":"Prescribed to help slow the progression of Alzheimer's symptoms. It does not cure or stop the disease, but can improve day-to-day function in early to moderate stages.","sideEffects":["Nausea and vomiting (especially when first starting)","Diarrhea","Muscle cramps","Insomnia — often best taken in the morning","Slowed heart rate (rare but important)"],"warning":["Unusual heart rhythm or fainting","Severe nausea that prevents eating","Worsening confusion that seems sudden"]},
  "memantine":{"what":"Memantine regulates glutamate — a brain chemical involved in learning and memory. It works differently than donepezil and is often prescribed together with it.","why":"Used in moderate to severe Alzheimer's to help with daily function, memory, and behavior. May reduce agitation and improve the ability to carry out daily activities.","sideEffects":["Dizziness","Headache","Confusion (usually temporary when starting)","Constipation"],"warning":["Sudden increase in confusion","Severe dizziness or falls","New agitation or hallucinations"]},
  "lisinopril":{"what":"Lisinopril is an ACE inhibitor — a medication that relaxes blood vessels, making it easier for the heart to pump blood.","why":"Commonly prescribed for high blood pressure, heart failure, or to protect the kidneys in diabetes. Helps reduce strain on the heart.","sideEffects":["Persistent dry cough (very common)","Dizziness when standing up quickly","Elevated potassium levels","Low blood pressure"],"warning":["Swelling of face, lips, or throat — seek emergency care immediately","Severe dizziness or fainting","Significantly reduced urine output"]},
  "furosemide":{"what":"Furosemide (Lasix) is a diuretic — commonly called a water pill. It causes the kidneys to remove excess fluid from the body through urine.","why":"Used in heart failure, kidney disease, or liver disease to remove excess fluid buildup (edema) from the legs, lungs, and body.","sideEffects":["Frequent urination","Dizziness from fluid loss","Low potassium levels — may need supplements","Sensitivity to sunlight"],"warning":["Sudden weight loss of more than 2 lbs in a day","Severe dizziness or fainting","Muscle cramps or weakness (sign of low potassium)","Significantly reduced urine despite taking the medication"]},
  "morphine":{"what":"Morphine is an opioid pain medication that works by binding to pain receptors in the brain and spinal cord. It is one of the most effective medications for managing moderate to severe pain and breathlessness.","why":"Used in hospice and palliative care to manage pain, severe breathlessness, and agitation at end of life. At the doses used in hospice, it reduces suffering without hastening death.","sideEffects":["Drowsiness and sedation","Constipation — almost universal, requires a bowel regimen","Nausea when first starting","Dry mouth"],"warning":["Breathing rate drops below 8-10 breaths per minute","Unresponsive or very difficult to wake","Pinpoint pupils with confusion — contact the hospice nurse"]},
};

<script>

}

// ═══════════════════════════════════════════════════════
//  CLINICAL SCALES
// ═══════════════════════════════════════════════════════
var SCALES={
  fast:{name:"FAST Scale",full:"Functional Assessment Staging Tool",color:"var(--r-purple)",icon:"🧠",
    categories:[
      {name:"Stage",items:[
        {s:1,label:"Normal Adult",desc:"No subjective or objective functional decrement"},
        {s:2,label:"Subjective Deficit",desc:"Complains of forgetting names, locations of objects"},
        {s:3,label:"Early Incipient",desc:"Decreased job functioning, difficulty with travel to new locations — 2-year duration expected"},
        {s:4,label:"Late Incipient",desc:"Decreased ability to handle complex tasks (finances, hosting dinner parties) — 2-year duration"},
        {s:5,label:"Mild Dementia",desc:"Requires supervision selecting proper clothing for weather; may need reminders"},
        {s:"6a",label:"Mod-Severe: Dressing",desc:"Occasionally or more frequently cannot dress properly without assistance"},
        {s:"6b",label:"Mod-Severe: Bathing",desc:"Unable to bathe properly without assistance — often fear of bathing"},
        {s:"6c",label:"Mod-Severe: Toileting",desc:"Unable to toilet properly; may forget to flush, wipe improperly"},
        {s:"6d",label:"Mod-Severe: Urinary",desc:"Urinary incontinence — occasionally or more frequently"},
        {s:"6e",label:"Mod-Severe: Bowel",desc:"Fecal incontinence — occasionally or more frequently"},
        {s:"7a",label:"★ HOSPICE THRESHOLD ★",desc:"Ability to speak limited to ≤6 intelligible words per day — PRIMARY hospice criterion"},
        {s:"7b",label:"Severe: Single Word",desc:"Ability limited to single intelligible word in an average day"},
        {s:"7c",label:"Severe: Non-Ambulatory",desc:"Non-ambulatory — unable to walk without personal assistance"},
        {s:"7d",label:"Severe: Non-Sitter",desc:"Unable to sit up independently without assistance"},
        {s:"7e",label:"Severe: No Smile",desc:"Loss of ability to smile"},
        {s:"7f",label:"Severe: Non-Responsive",desc:"Loss of ability to hold head up independently"},
      ]}
    ],
    score:function(sel){
      if(!sel.stage) return null;
      var st=sel.stage; var num=parseFloat(st);
      if(st==="7a"||st==="7b"||st==="7c"||st==="7d"||st==="7e"||st==="7f") return {score:"Stage "+st.toUpperCase(),interp:"Severe — HOSPICE ELIGIBLE",color:"var(--r-red)",alert:true};
      if(st==="6a"||st==="6b"||st==="6c"||st==="6d"||st==="6e") return {score:"Stage "+st.toUpperCase(),interp:"Moderately Severe — Assess for hospice eligibility with comorbidities",color:"var(--r-amber)"};
      if(num===5) return {score:"Stage 5",interp:"Mild Dementia",color:"var(--r-amber)"};
      if(num===4) return {score:"Stage 4",interp:"Late Incipient",color:"var(--r-green)"};
      return {score:"Stage "+st,interp:"Early / Normal",color:"var(--r-green)"};
    }},
  pps:{name:"PPS",full:"Palliative Performance Scale v2",color:"var(--r-teal)",icon:"📉",
    categories:[{name:"PPS Score",items:[
      {s:10,label:"100% — Normal",desc:"Normal activity and work; no evidence of disease"},
      {s:9,label:"90% — Normal Activity",desc:"Normal activity; minor signs of disease"},
      {s:8,label:"80% — Normal with Effort",desc:"Normal activity with effort; some evidence of disease"},
      {s:7,label:"70% — Reduced",desc:"Unable to do normal work; significant disease"},
      {s:6,label:"60% — Reduced",desc:"Unable to do hobbies; significant disease; occasional assistance"},
      {s:5,label:"50% — Mainly Sit/Lie ⚠️",desc:"Unable to do any work; extensive disease; considerable assistance needed"},
      {s:4,label:"40% — Mainly in Bed ⚠️",desc:"Unable to do most activity; extensive disease; mainly assisted"},
      {s:3,label:"30% — Bed Bound ⚠️",desc:"Unable to do any activity; extensive disease; total care"},
      {s:2,label:"20% — Bed Bound ⚠️",desc:"Unable to do any activity; extensive disease; total care; reduced intake"},
      {s:1,label:"10% — Bed Bound ⚠️",desc:"Drowsy or coma; total care; minimal intake"},
      {s:0,label:"0% — Death",desc:"Death"},
    ]}],
    score:function(sel){
      var v=sel.pps; if(v===undefined||v===null) return null;
      var pct=v*10;
      if(pct<=40) return {score:pct+"%",interp:"Hospice eligible — PPS ≤40% supports LCD criteria",color:"var(--r-red)",alert:true};
      if(pct<=50) return {score:pct+"%",interp:"Borderline — Consider hospice assessment",color:"var(--r-amber)"};
      return {score:pct+"%",interp:"Not yet hospice-level — Monitor trends",color:"var(--r-green)"};
    }},
  gcs:{name:"GCS",full:"Glasgow Coma Scale",color:"var(--r-blue)",icon:"🧠",
    categories:[
      {name:"Eye Opening",key:"E",items:[{s:4,label:"4 — Spontaneous",desc:"Opens eyes spontaneously"},{s:3,label:"3 — To Sound",desc:"Opens eyes in response to voice"},{s:2,label:"2 — To Pain",desc:"Opens eyes in response to painful stimuli"},{s:1,label:"1 — None",desc:"Does not open eyes"}]},
      {name:"Verbal Response",key:"V",items:[{s:5,label:"5 — Oriented",desc:"Oriented; converses normally"},{s:4,label:"4 — Confused",desc:"Confused; disoriented"},{s:3,label:"3 — Words",desc:"Speaks words but not coherently"},{s:2,label:"2 — Sounds",desc:"Makes sounds but no words"},{s:1,label:"1 — None",desc:"Makes no sounds"}]},
      {name:"Motor Response",key:"M",items:[{s:6,label:"6 — Obeys Commands",desc:"Follows simple commands"},{s:5,label:"5 — Localizes Pain",desc:"Moves purposefully toward painful stimuli"},{s:4,label:"4 — Withdrawal",desc:"Pulls away from pain"},{s:3,label:"3 — Flexion",desc:"Decorticate posturing"},{s:2,label:"2 — Extension",desc:"Decerebrate posturing"},{s:1,label:"1 — None",desc:"No motor response"}]},
    ],
    score:function(sel){
      var t=(sel.E||0)+(sel.V||0)+(sel.M||0); if(!sel.E&&!sel.V&&!sel.M) return null;
      if(t<=8) return {score:t+"/15",interp:"Severe — Coma (GCS ≤8). Requires immediate intervention. Consider intubation.",color:"var(--r-red)",alert:true};
      if(t<=12) return {score:t+"/15",interp:"Moderate brain injury — Close monitoring required",color:"var(--r-amber)"};
      return {score:t+"/15",interp:"Mild — Monitor for deterioration",color:"var(--r-green)"};
    }},
  braden:{name:"Braden",full:"Braden Scale for Pressure Injury Risk",color:"var(--r-teal)",icon:"🛏",
    categories:[
      {name:"Sensory Perception",key:"SP",items:[{s:1,label:"1 — Completely Limited",desc:"Unresponsive to painful stimuli"},{s:2,label:"2 — Very Limited",desc:"Responds only to pain; cannot communicate discomfort"},{s:3,label:"3 — Slightly Limited",desc:"Responds to verbal commands; some sensory impairment"},{s:4,label:"4 — No Impairment",desc:"Responds to verbal commands; no sensory deficit"}]},
      {name:"Moisture",key:"MO",items:[{s:1,label:"1 — Constantly Moist",desc:"Skin is kept moist almost constantly by perspiration, urine"},{s:2,label:"2 — Very Moist",desc:"Skin is often moist; linen must be changed at least every 8 hours"},{s:3,label:"3 — Occasionally Moist",desc:"Skin is occasionally moist"},{s:4,label:"4 — Rarely Moist",desc:"Skin is usually dry; routine diaper/linen changes"}]},
      {name:"Activity",key:"AC",items:[{s:1,label:"1 — Bedfast",desc:"Confined to bed"},{s:2,label:"2 — Chairfast",desc:"Ability to walk severely limited; cannot bear own weight"},{s:3,label:"3 — Walks Occasionally",desc:"Walks occasionally during day but for very short distances"},{s:4,label:"4 — Walks Frequently",desc:"Walks outside room at least twice a day"}]},
      {name:"Mobility",key:"MB",items:[{s:1,label:"1 — Completely Immobile",desc:"Does not make even slight changes in body or extremity position"},{s:2,label:"2 — Very Limited",desc:"Makes occasional slight changes but unable to make frequent or significant changes"},{s:3,label:"3 — Slightly Limited",desc:"Makes frequent though slight changes in body position"},{s:4,label:"4 — No Limitation",desc:"Makes major and frequent changes without assistance"}]},
      {name:"Nutrition",key:"NU",items:[{s:1,label:"1 — Very Poor",desc:"Never eats a complete meal; rarely eats more than ⅓ of food offered"},{s:2,label:"2 — Probably Inadequate",desc:"Rarely eats a complete meal; generally eats ½ of food offered"},{s:3,label:"3 — Adequate",desc:"Eats over half of most meals"},{s:4,label:"4 — Excellent",desc:"Eats most of every meal; never refuses a meal"}]},
      {name:"Friction & Shear",key:"FS",items:[{s:1,label:"1 — Problem",desc:"Requires moderate to maximum assistance; complete lifting without sliding not possible"},{s:2,label:"2 — Potential Problem",desc:"Moves feebly or requires minimum assistance"},{s:3,label:"3 — No Apparent Problem",desc:"Moves in bed and in chair independently; sufficient muscle strength"}]},
    ],
    score:function(sel){
      var keys=["SP","MO","AC","MB","NU","FS"]; var t=0; var hasAll=true;
      keys.forEach(function(k){if(sel[k]) t+=sel[k]; else hasAll=false;});
      if(!hasAll) return null;
      if(t<=9) return {score:t+"/23",interp:"Very High Risk — Implement intensive prevention protocol",color:"var(--r-red)",alert:true};
      if(t<=12) return {score:t+"/23",interp:"High Risk — Turning q2h, pressure-redistributing surface, barrier cream",color:"var(--r-red)"};
      if(t<=14) return {score:t+"/23",interp:"Moderate Risk — Turning schedule, skin assessment with each care",color:"var(--r-amber)"};
      if(t<=18) return {score:t+"/23",interp:"Mild Risk — Education, standard prevention, monitor",color:"var(--r-amber)"};
      return {score:t+"/23",interp:"No Risk — Continue standard skin care",color:"var(--r-green)"};
    }},
  morse:{name:"Morse Fall",full:"Morse Fall Scale",color:"var(--r-amber)",icon:"🚶",
    categories:[
      {name:"History of Falling",key:"HF",items:[{s:25,label:"25 — Yes",desc:"Has fallen in the past 3 months"},{s:0,label:"0 — No",desc:"No history of falls in past 3 months"}]},
      {name:"Secondary Diagnosis",key:"SD",items:[{s:15,label:"15 — Yes",desc:"More than one medical diagnosis"},{s:0,label:"0 — No",desc:"Single medical diagnosis"}]},
      {name:"Ambulatory Aid",key:"AA",items:[{s:30,label:"30 — Furniture",desc:"Holds onto furniture when walking"},{s:15,label:"15 — Crutches/Cane/Walker",desc:"Uses crutch, cane, or walker"},{s:0,label:"0 — None/Bedrest/Nurse",desc:"None, bed rest, or assisted by nurse"}]},
      {name:"IV / Heparin Lock",key:"IV",items:[{s:20,label:"20 — Yes",desc:"IV access or heparin/saline lock present"},{s:0,label:"0 — No",desc:"No IV access"}]},
      {name:"Gait",key:"GA",items:[{s:20,label:"20 — Impaired",desc:"Short steps, shuffles, difficulty rising from chair"},{s:10,label:"10 — Weak",desc:"Stooped but able to lift head while walking"},{s:0,label:"0 — Normal/Bedrest",desc:"Normal, on bed rest, or in wheelchair"}]},
      {name:"Mental Status",key:"MS",items:[{s:15,label:"15 — Overestimates / Forgets Limitations",desc:"Not aware of physical limitations"},{s:0,label:"0 — Oriented to own ability",desc:"Consistent self-assessment of ability"}]},
    ],
    score:function(sel){
      var keys=["HF","SD","AA","IV","GA","MS"]; var t=0; var hasAll=true;
      keys.forEach(function(k){if(sel[k]!==undefined) t+=sel[k]; else hasAll=false;});
      if(!hasAll) return null;
      if(t>=45) return {score:t,interp:"High Risk — Implement fall prevention protocol: bed alarm, hourly rounding, non-slip footwear",color:"var(--r-red)",alert:true};
      if(t>=25) return {score:t,interp:"Medium Risk — Standard fall prevention measures",color:"var(--r-amber)"};
      return {score:t,interp:"Low Risk — Routine care",color:"var(--r-green)"};
    }},
  cam:{name:"CAM",full:"Confusion Assessment Method",color:"var(--r-blue)",icon:"🔮",
    categories:[
      {name:"Feature 1: Acute Onset & Fluctuation",key:"F1",items:[{s:1,label:"Present",desc:"Is there evidence of an acute change in mental status from baseline? Does the behavior fluctuate during the day?"},{s:0,label:"Absent",desc:"No acute change or fluctuating course"}]},
      {name:"Feature 2: Inattention",key:"F2",items:[{s:1,label:"Present",desc:"Did the patient have difficulty focusing attention? Easily distracted? Difficulty keeping track of what was said?"},{s:0,label:"Absent",desc:"No significant inattention"}]},
      {name:"Feature 3: Disorganized Thinking",key:"F3",items:[{s:1,label:"Present",desc:"Was the patient's thinking disorganized? Incoherent conversation? Unpredictable switching of subjects?"},{s:0,label:"Absent",desc:"No disorganized thinking"}]},
      {name:"Feature 4: Altered Level of Consciousness",key:"F4",items:[{s:1,label:"Present",desc:"Overall level of consciousness: alert, vigilant, lethargic, stupor, or coma (anything other than alert = present)"},{s:0,label:"Absent",desc:"Alert and oriented (score does not equal CAM positive alone)"}]},
    ],
    score:function(sel){
      if(sel.F1===undefined||sel.F2===undefined) return null;
      var pos=(sel.F1===1&&sel.F2===1&&(sel.F3===1||sel.F4===1));
      if(pos) return {score:"POSITIVE",interp:"CAM Positive — Delirium present. Identify and treat underlying cause. Implement non-pharmacologic interventions.",color:"var(--r-red)",alert:true};
      return {score:"NEGATIVE",interp:"CAM Negative — Delirium not detected. Continue monitoring.",color:"var(--r-green)"};
    }},
  rass:{name:"RASS",full:"Richmond Agitation-Sedation Scale",color:"var(--r-purple)",icon:"😴",
    categories:[{name:"Level of Sedation/Agitation",key:"RS",items:[
      {s:4,label:"+4 — Combative",desc:"Overtly combative or violent; immediate danger to staff"},
      {s:3,label:"+3 — Very Agitated",desc:"Pulls or removes tubes/catheters; aggressive"},
      {s:2,label:"+2 — Agitated",desc:"Frequent non-purposeful movement; fights ventilator"},
      {s:1,label:"+1 — Restless",desc:"Anxious or apprehensive but not aggressive"},
      {s:0,label:"0 — Alert & Calm",desc:"Alert and calm (target for most patients)"},
      {s:-1,label:"-1 — Drowsy",desc:"Briefly awakens to voice; eye opening >10 seconds"},
      {s:-2,label:"-2 — Light Sedation",desc:"Eye opening briefly to voice (<10 sec)"},
      {s:-3,label:"-3 — Moderate Sedation",desc:"Movement or eye opening to voice, no eye contact"},
      {s:-4,label:"-4 — Deep Sedation",desc:"No response to voice; movement or eye opening to physical stimulation"},
      {s:-5,label:"-5 — Unarousable",desc:"No response to voice or physical stimulation"},
    ]}],
    score:function(sel){
      if(sel.RS===undefined) return null;
      var v=sel.RS;
      if(v>=2) return {score:v>0?"+"+v:v,interp:"Agitated — Assess for pain, positioning, environment. Consider pharmacologic intervention.",color:"var(--r-red)",alert:true};
      if(v<=-3) return {score:v,interp:"Over-sedated — Consider reducing sedation. Assess ability to wean.",color:"var(--r-amber)",alert:true};
      if(v===-1||v===-2) return {score:v,interp:"Lightly sedated — Assess if target RASS achieved",color:"var(--r-blue)"};
      return {score:"0",interp:"Alert and calm — Target achieved",color:"var(--r-green)"};
    }},
  ciwa:{name:"CIWA-Ar",full:"Clinical Institute Withdrawal Assessment — Alcohol",color:"var(--r-red)",icon:"🍺",
    categories:[
      {name:"Nausea/Vomiting",key:"NV",items:[{s:0,label:"0 — None",desc:""},{s:1,label:"1 — Mild nausea, no vomiting",desc:""},{s:4,label:"4 — Intermittent nausea with retching",desc:""},{s:7,label:"7 — Constant nausea, frequent retching",desc:""}]},
      {name:"Tremor",key:"TR",items:[{s:0,label:"0 — No tremor",desc:""},{s:1,label:"1 — Not visible, felt fingertip to fingertip",desc:""},{s:4,label:"4 — Moderate, arms extended",desc:""},{s:7,label:"7 — Severe even with arms not extended",desc:""}]},
      {name:"Paroxysmal Sweats",key:"SW",items:[{s:0,label:"0 — No sweat",desc:""},{s:1,label:"1 — Barely perceptible sweating",desc:""},{s:4,label:"4 — Beads of sweat on forehead",desc:""},{s:7,label:"7 — Drenching sweats",desc:""}]},
      {name:"Anxiety",key:"AX",items:[{s:0,label:"0 — No anxiety, at ease",desc:""},{s:1,label:"1 — Mildly anxious",desc:""},{s:4,label:"4 — Moderately anxious or guarded",desc:""},{s:7,label:"7 — Equivalent to acute panic states",desc:""}]},
      {name:"Agitation",key:"AG",items:[{s:0,label:"0 — Normal activity",desc:""},{s:1,label:"1 — Somewhat more than normal",desc:""},{s:4,label:"4 — Moderately fidgety and restless",desc:""},{s:7,label:"7 — Paces or thrashes about",desc:""}]},
      {name:"Headache",key:"HA",items:[{s:0,label:"0 — Not present",desc:""},{s:1,label:"1 — Very mild",desc:""},{s:4,label:"4 — Moderately severe",desc:""},{s:7,label:"7 — Extremely severe",desc:""}]},
      {name:"Orientation",key:"OR",items:[{s:0,label:"0 — Oriented",desc:"Date and name correct"},{s:2,label:"2 — Date error >2 days",desc:""},{s:4,label:"4 — Additional disorientation",desc:""},{s:null,label:"Uncertain / Not Assessed",desc:""}]},
    ],
    score:function(sel){
      var keys=["NV","TR","SW","AX","AG","HA"]; var t=0; var hasAny=false;
      keys.forEach(function(k){if(sel[k]!==undefined&&sel[k]!==null){t+=sel[k];hasAny=true;}});
      if(!hasAny) return null;
      if(t>=15) return {score:t+"/67",interp:"Severe Withdrawal — Pharmacologic intervention required. Benzodiazepine protocol. Consider ICU.",color:"var(--r-red)",alert:true};
      if(t>=8) return {score:t+"/67",interp:"Moderate — Administer PRN benzodiazepine per protocol. Monitor every 1-2 hours.",color:"var(--r-amber)"};
      return {score:t+"/67",interp:"Mild — Supportive care, monitoring, PRN medication available",color:"var(--r-green)"};
    }},
  news2:{name:"NEWS2",full:"National Early Warning Score 2",color:"var(--r-blue)",icon:"⚠️",
    categories:[
      {name:"Respiratory Rate (breaths/min)",key:"RR",items:[{s:3,label:"≤8",desc:""},{s:1,label:"9–11",desc:""},{s:0,label:"12–20",desc:"Normal"},{s:2,label:"21–24",desc:""},{s:3,label:"≥25",desc:""}]},
      {name:"SpO2 % (without O2)",key:"SP",items:[{s:3,label:"≤91%",desc:""},{s:2,label:"92–93%",desc:""},{s:1,label:"94–95%",desc:""},{s:0,label:"≥96%",desc:"Normal"}]},
      {name:"Systolic BP (mmHg)",key:"SBP",items:[{s:3,label:"≤90",desc:""},{s:2,label:"91–100",desc:""},{s:1,label:"101–110",desc:""},{s:0,label:"111–219",desc:"Normal"},{s:3,label:"≥220",desc:""}]},
      {name:"Pulse (bpm)",key:"HR",items:[{s:3,label:"≤40",desc:""},{s:1,label:"41–50",desc:""},{s:0,label:"51–90",desc:"Normal"},{s:1,label:"91–110",desc:""},{s:2,label:"111–130",desc:""},{s:3,label:"≥131",desc:""}]},
      {name:"Consciousness",key:"CN",items:[{s:0,label:"A — Alert",desc:"Fully alert"},{s:3,label:"C — Confusion",desc:"New confusion"},{s:3,label:"V — Voice",desc:"Responds to voice"},{s:3,label:"P/U — Pain/Unresponsive",desc:"Responds to pain or unresponsive"}]},
      {name:"Temperature (°C)",key:"TMP",items:[{s:3,label:"≤35.0°C",desc:""},{s:1,label:"35.1–36.0°C",desc:""},{s:0,label:"36.1–38.0°C",desc:"Normal"},{s:1,label:"38.1–39.0°C",desc:""},{s:2,label:"≥39.1°C",desc:""}]},
    ],
    score:function(sel){
      var keys=["RR","SP","SBP","HR","CN","TMP"]; var t=0; var hasAny=false;
      keys.forEach(function(k){if(sel[k]!==undefined){t+=sel[k];hasAny=true;}});
      if(!hasAny) return null;
      if(t>=7) return {score:t,interp:"HIGH Risk — Emergency response. Continuous monitoring, senior nurse/physician NOW.",color:"var(--r-red)",alert:true};
      if(t>=5) return {score:t,interp:"Medium-High — Urgent review by physician or senior nurse within 30 minutes",color:"var(--r-red)"};
      if(t>=3) return {score:t,interp:"Low-Medium — Increased monitoring frequency. Notify charge nurse.",color:"var(--r-amber)"};
      return {score:t,interp:"Low Risk — Continue routine monitoring",color:"var(--r-green)"};
    }},
  nyha:{name:"NYHA",full:"NYHA Heart Failure Classification",color:"var(--r-blue)",icon:"❤️",
    categories:[{name:"Functional Class",key:"FC",items:[
      {s:1,label:"Class I — No Limitation",desc:"Ordinary physical activity does not cause symptoms. No dyspnea, fatigue, or palpitations with ordinary activity."},
      {s:2,label:"Class II — Slight Limitation",desc:"Comfortable at rest. Ordinary physical activity (climbing stairs, walking uphill) causes symptoms."},
      {s:3,label:"Class III — Marked Limitation",desc:"Comfortable at rest. Less than ordinary activity causes symptoms. Activities of daily living limited."},
      {s:4,label:"Class IV — Symptoms at Rest",desc:"Symptoms present at rest. Any activity increases discomfort. Essentially housebound or bedbound."},
    ]}],
    score:function(sel){
      if(!sel.FC) return null;
      if(sel.FC===4) return {score:"Class IV",interp:"Severe — Hospice appropriate. Symptoms at rest. Cannot perform any activity without discomfort.",color:"var(--r-red)",alert:true};
      if(sel.FC===3) return {score:"Class III",interp:"Marked limitation — Consider referral to heart failure specialist. Assess medication optimization.",color:"var(--r-amber)"};
      if(sel.FC===2) return {score:"Class II",interp:"Mild limitation — Monitor, optimize medications, lifestyle modification",color:"var(--r-green)"};
      return {score:"Class I",interp:"No limitation",color:"var(--r-green)"};
    }},
};

function renderRNScaleEntry(page){

  // Score display at top

  if(result){
    scoreBig.innerHTML='<div style="font-size:40px;font-weight:700;color:'+result.color+';font-family:\'DM Mono\',monospace;margin-bottom:4px">'+result.score+'</div><div style="font-size:17px;color:var(--r-sec);line-height:1.5">'+result.interp+'</div>'+(result.alert?'<div style="margin-top:10px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px;font-size:15px;font-weight:700;color:var(--r-red)">⚠️ CLINICAL ALERT — See interpretation above</div>':"");
  } else {
    scoreBig.innerHTML='<div style="font-size:17px;color:var(--r-muted)">Complete entries below to calculate score</div>';
  }
  add(body,scoreBig);
  // Categories
  sc.categories.forEach(function(cat){
    var sec=div("r-card","margin-bottom:10px;");
    var cl=div("r-label","margin-bottom:10px;"); cl.textContent=cat.name; add(sec,cl);
    var stateKey=cat.key||"stage";
    cat.items.forEach(function(item){
      var isSet=(S.rScoreState[stateKey]!==undefined);
      var isSel=(S.rScoreState[stateKey]===item.s);
      if(item.s===null){ return; } // skip unscored placeholder items
      var opt=div("scale-opt"+(isSel?" sel":""));
      var num=div("scale-opt-num"); num.textContent=typeof item.s==="number"&&item.s>0?item.s:(typeof item.s==="string"?item.s.toUpperCase():String(item.s)); add(opt,num);
      var txt=div("scale-opt-text");
      var lbl=div("scale-opt-label"); lbl.textContent=item.label; add(txt,lbl);
      if(item.desc){var sub=div("scale-opt-sub"); sub.textContent=item.desc; add(txt,sub);}
      add(opt,txt);
      opt.onclick=(function(sk, sv){ return function(){
        S.rScoreState[sk]=sv;
        var res2=sc.score(S.rScoreState);
        if(res2){ save("cp_rscores",[{name:sc.name,score:res2.score,interp:res2.interp,color:res2.color,date:new Date().toISOString()}].concat(S.rScores.slice(0,9))); S.rScores=JSON.parse(localStorage.getItem("cp_rscores")||"[]"); }
        render();
      };})(stateKey, item.s);
      add(sec,opt);
    });
    add(body,sec);
  });
  // Clear
  var clearBtn=btn("r-btn r-btn-full","Clear All",function(){S.rScoreState={};render();});
  clearBtn.style.cssText="width:100%;padding:12px;border-radius:10px;background:var(--r-card2);border:1px solid var(--r-border);color:var(--r-muted);font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;";
  add(body,clearBtn);
  add(page,body);
  add(page,rNav("rn-scales"));
}
</script>
<script>
// ═══════════════════════════════════════════════════════
//  SBAR GENERATOR
// ═══════════════════════════════════════════════════════
function renderRNSBAR(page){
  add(page,rTopBar("SBAR Generator",false));
  var body=div("r-body");
  // Intro
  var intro=div("r-card r-card-blue","margin-bottom:12px;");
  intro.innerHTML='<div style="font-size:18px;font-weight:700;color:var(--r-pri);margin-bottom:4px">Structured Communication Tool</div><div style="font-size:17px;color:var(--r-sec);line-height:1.6">Complete each section. The formatted SBAR report will generate automatically for physician calls or handoffs.</div>';
  add(body,intro);
  var sections=[
    {key:"situation",color:"var(--r-blue)",label:"S — SITUATION",placeholder:"What is happening RIGHT NOW? e.g. 'I am calling about patient John Smith in room 412. His oxygen saturation has dropped to 88% in the last 30 minutes.'"},
    {key:"background",color:"var(--r-teal)",label:"B — BACKGROUND",placeholder:"Relevant history. e.g. 'Mr. Smith is a 74-year-old with COPD and heart failure admitted 3 days ago. He is a DNR/DNI. Current medications include furosemide and albuterol.'"},
    {key:"assessment",color:"var(--r-amber)",label:"A — ASSESSMENT",placeholder:"What do you think is going on? e.g. 'I believe his deterioration may be related to fluid overload vs. COPD exacerbation. Braden score 12, NEWS2 score 6.'"},
    {key:"recommendation",color:"var(--r-red)",label:"R — RECOMMENDATION",placeholder:"What do you need? e.g. 'I would like you to come assess the patient. In the meantime, should I obtain an ABG and chest X-ray? What would you like me to do if his O2 drops below 85%?'"},
  ];
  sections.forEach(function(sec){
    var card=div("sbar-section","margin-bottom:10px;border-color:"+sec.color+";");
    var lbl=div("sbar-label","color:"+sec.color+";"); lbl.textContent=sec.label; add(card,lbl);
    var t=ta("","",S.sbarData[sec.key],function(){S.sbarData[sec.key]=this.value;updateSBAR();});
    t.style.cssText="width:100%;background:var(--r-bg);border:1px solid var(--r-border);border-radius:8px;padding:10px 12px;color:var(--r-pri);font-size:17px;line-height:1.6;resize:none;font-family:'DM Sans',sans-serif;";
    t.rows=3; t.placeholder=sec.placeholder;
    add(card,t);
    add(body,card);
  });
  // Auto-fill from patient
  var auto=btn("r-btn r-btn-teal","Auto-Fill from Patient Profile",function(){
    S.sbarData.background="Patient: "+S.patient.name+(S.patient.dob?" | DOB: "+S.patient.dob:"")+" | Diagnoses: "+S.patient.diagnoses.join(", ")+" | Code Status: "+S.patient.codeStatus+" | Allergies: "+S.patient.allergies.join(", ")+" | Medications: "+S.patient.medications.join(", ");
    var app=document.getElementById("app"); app.innerHTML=""; var pg=document.createElement("div"); pg.className="page r-page"; renderRNSBAR(pg); app.appendChild(pg);
  });
  auto.style.cssText="width:100%;padding:12px;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:12px;font-family:'DM Sans',sans-serif;background:var(--r-teal);color:white;border:none;";
  add(body,auto);
  // Result
  if(S.sbarData.situation||S.sbarData.background){
    var rl=div("r-label","margin-bottom:8px;"); rl.textContent="FORMATTED SBAR"; add(body,rl);
    var result=div("sbar-result");
    result.textContent=buildSBAR();
    add(body,result);
    var copyBtn=btn("r-btn r-btn-blue r-btn-full","📋 Copy to Clipboard",function(){
      navigator.clipboard&&navigator.clipboard.writeText(buildSBAR()).then(function(){copyBtn.textContent="✅ Copied!";setTimeout(function(){copyBtn.textContent="📋 Copy to Clipboard";},2000);});
    });
    copyBtn.style.cssText="width:100%;padding:12px;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;margin-top:10px;font-family:'DM Sans',sans-serif;background:var(--r-blue);color:white;border:none;";
    add(body,copyBtn);
    // Clear
    var clrBtn=btn("","Clear All",function(){
      S.sbarData={situation:"",background:"",assessment:"",recommendation:""};
      var app=document.getElementById("app"); app.innerHTML=""; var pg=document.createElement("div"); pg.className="page r-page"; renderRNSBAR(pg); app.appendChild(pg);
    });
    clrBtn.style.cssText="width:100%;padding:12px;border-radius:10px;background:var(--r-card2);border:1px solid var(--r-border);color:var(--r-muted);font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;";
    add(body,clrBtn);
  }
  add(page,body);
  add(page,rNav("rn-sbar"));
}
function buildSBAR(){
  var d=S.sbarData; var now=new Date().toLocaleString();
  var out="=== SBAR COMMUNICATION ===\n"+now+"\n\n";
  if(d.situation) out+="SITUATION:\n"+d.situation+"\n\n";
  if(d.background) out+="BACKGROUND:\n"+d.background+"\n\n";
  if(d.assessment) out+="ASSESSMENT:\n"+d.assessment+"\n\n";
  if(d.recommendation) out+="RECOMMENDATION:\n"+d.recommendation+"\n\n";
  out+="========================";
  return out;
}
function updateSBAR(){
  var app=document.getElementById("app"); app.innerHTML=""; var pg=document.createElement("div"); pg.className="page r-page"; renderRNSBAR(pg); app.appendChild(pg);
}

// ═══════════════════════════════════════════════════════
//  CALCULATORS
// ═══════════════════════════════════════════════════════
function renderRNCalcs(page){
  add(page,rTopBar("Calculators",false));
  var body=div("r-body");
  // Tab bar
  var tabs=div("","display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;");
  var calcTabs=[["drip","IV Drip"],["dose","Wt Dose"],["fluid","Fluid Bal"],["bmi","BMI"],["crcl","CrCl"]];
  calcTabs.forEach(function(t){
    var b=btn("","",function(){S.calcTab=t[0];S.calcVals={};var app=document.getElementById("app");app.innerHTML="";var pg=document.createElement("div");pg.className="page r-page";renderRNCalcs(pg);app.appendChild(pg);});
    b.textContent=t[1];
    b.style.cssText="padding:8px 16px;border-radius:50px;font-size:17px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;"+(S.calcTab===t[0]?"background:var(--r-blue);color:white;border:none;":"background:var(--r-card2);color:var(--r-sec);border:1px solid var(--r-border);");
    add(tabs,b);
  });
  add(body,tabs);
  var v=S.calcVals;
  function numInp(label,key,placeholder,unit){
    var g=div("","margin-bottom:12px;");
    var l=div("r-label","margin-bottom:6px;"); l.textContent=label+(unit?" ("+unit+")":""); add(g,l);
    var i=inp("calc-input",placeholder,v[key]||"",function(){v[key]=parseFloat(this.value)||0;renderCalcResult(body,calcResult());});
    i.type="number"; i.inputMode="decimal";
    add(g,i); return g;
  }
  function calcResult(){
    if(S.calcTab==="drip"){
      if(!v.vol||!v.hrs) return null;
      var rate=v.vol/v.hrs;
      var drip60=rate/60*60, drip15=rate/60*15, drip10=rate/60*10;
      return {val:rate.toFixed(1),unit:"mL/hr",detail:"Drop factors: 60 gtt/mL → "+(rate).toFixed(0)+" gtt/min | 15 gtt/mL → "+(drip15).toFixed(0)+" gtt/min | 10 gtt/mL → "+(drip10).toFixed(0)+" gtt/min"};
    }
    if(S.calcTab==="dose"){
      if(!v.wt||!v.mcg) return null;
      var mghr=v.mcg*v.wt*60/1000;
      var mlhr=v.conc?mghr/v.conc:null;
      return {val:mghr.toFixed(2),unit:"mg/hr",detail:mlhr?"At "+v.conc+" mg/mL concentration: "+mlhr.toFixed(1)+" mL/hr":"Enter concentration for mL/hr"};
    }
    if(S.calcTab==="fluid"){
      var totalIn=(v.iv||0)+(v.oral||0)+(v.tf||0);
      var totalOut=(v.urine||0)+(v.drain||0)+(v.other||0);
      var balance=totalIn-totalOut;
      return {val:(balance>=0?"+":"")+balance,unit:"mL balance",detail:"Total In: "+totalIn+" mL | Total Out: "+totalOut+" mL",color:balance>500?"var(--r-amber)":balance<-500?"var(--r-red)":"var(--r-green)"};
    }
    if(S.calcTab==="bmi"){
      if(!v.wt||!v.ht) return null;
      var bmi=v.wt/(v.ht/100)/(v.ht/100);
      var cat=bmi<18.5?"Underweight":bmi<25?"Normal weight":bmi<30?"Overweight":bmi<35?"Obese Class I":bmi<40?"Obese Class II":"Obese Class III";
      var ibw=v.sex==="f"?45.5+2.3*(v.ht/2.54-60):50+2.3*(v.ht/2.54-60);
      return {val:bmi.toFixed(1),unit:cat,detail:"IBW (Devine): "+(ibw>0?ibw.toFixed(1)+"kg":"enter height in cm")+" | Ht: "+v.ht+"cm Wt: "+v.wt+"kg"};
    }
    if(S.calcTab==="crcl"){
      if(!v.age||!v.wt||!v.cr) return null;
      var crcl=((140-v.age)*v.wt)/(72*v.cr)*(v.sex==="f"?0.85:1);
      var stage=crcl>=90?"G1 Normal":crcl>=60?"G2 Mild":crcl>=45?"G3a Mild-Mod":crcl>=30?"G3b Mod-Severe":crcl>=15?"G4 Severe":"G5 Kidney Failure";
      return {val:crcl.toFixed(1),unit:"mL/min (CrCl)",detail:"CKD Stage: "+stage+" | Adjust doses for medications renally cleared at CrCl <60"};
    }
    return null;
  }
  function renderCalcResult(body,res){
    var existing=body.querySelector(".calc-result");
    if(existing) existing.remove();
    if(res){
      var r=div("calc-result");
      r.innerHTML='<div class="big" style="color:'+(res.color||"var(--r-blue)")+'">'+res.val+'</div><div class="unit">'+res.unit+'</div>'+(res.detail?'<div style="font-size:15px;color:var(--r-muted);margin-top:8px;line-height:1.6">'+res.detail+'</div>':"");
      add(body,r);
    }
  }
  // Render calc inputs
  if(S.calcTab==="drip"){
    addAll(body,[numInp("Volume","vol","500","mL"),numInp("Time","hrs","8","hours")]);
  } else if(S.calcTab==="dose"){
    addAll(body,[numInp("Patient Weight","wt","70","kg"),numInp("Dose","mcg","5","mcg/kg/min"),numInp("Concentration (optional)","conc","","mg/mL")]);
  } else if(S.calcTab==="fluid"){
    var ihl=div("r-label","margin-bottom:6px;"); ihl.textContent="INTAKE"; add(body,ihl);
    addAll(body,[numInp("IV Fluids","iv","","mL"),numInp("Oral","oral","","mL"),numInp("Tube Feeds","tf","","mL")]);
    add(body,div("r-divider","margin:12px 0;"));
    var ohl=div("r-label","margin-bottom:6px;"); ohl.textContent="OUTPUT"; add(body,ohl);
    addAll(body,[numInp("Urine","urine","","mL"),numInp("Drains","drain","","mL"),numInp("Other (emesis/stool)","other","","mL")]);
  } else if(S.calcTab==="bmi"){
    addAll(body,[numInp("Weight","wt","70","kg"),numInp("Height","ht","170","cm")]);
    var sexL=div("r-label","margin-bottom:6px;"); sexL.textContent="SEX (for IBW/CrCl)"; add(body,sexL);
    var sexRow=div("","display:flex;gap:8px;margin-bottom:12px;");
    ["m","f"].forEach(function(sx){
      var b=btn("","",function(){v.sex=sx;renderCalcResult(body,calcResult());});
      b.textContent=sx==="m"?"Male":"Female";
      b.style.cssText="flex:1;padding:10px;border-radius:8px;font-size:17px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;"+(v.sex===sx?"background:var(--r-blue);color:white;border:none;":"background:var(--r-card2);color:var(--r-sec);border:1px solid var(--r-border);");
      add(sexRow,b);
    });
    add(body,sexRow);
  } else if(S.calcTab==="crcl"){
    addAll(body,[numInp("Age","age","","years"),numInp("Weight","wt","","kg"),numInp("Serum Creatinine","cr","","mg/dL")]);
    var sxL=div("r-label","margin-bottom:6px;"); sxL.textContent="SEX"; add(body,sxL);
    var sxRow=div("","display:flex;gap:8px;margin-bottom:12px;");
    ["m","f"].forEach(function(sx){
      var b=btn("","",function(){v.sex=sx;renderCalcResult(body,calcResult());});
      b.textContent=sx==="m"?"Male":"Female";
      b.style.cssText="flex:1;padding:10px;border-radius:8px;font-size:17px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;"+(v.sex===sx?"background:var(--r-blue);color:white;border:none;":"background:var(--r-card2);color:var(--r-sec);border:1px solid var(--r-border);");
      add(sxRow,b);
    });
    add(body,sxRow);
  }
  renderCalcResult(body,calcResult());
  add(page,body);
  add(page,rNav("rn-calculators"));
}

// ═══════════════════════════════════════════════════════

     alert:"FAST staging alone is NOT sufficient. Both Stage 7A+ AND at least one comorbid condition must be documented in the clinical record."},

    {title:"HIV / AIDS",icon:"🔴",color:"#BE185D",ref:"LCD L33393",

    {title:"General Debility / Failure to Thrive",icon:"📉",color:"#6B7280",ref:"LCD L33393 | Non-Disease Specific",

     whyHospice:"Many patients do not have a single clear terminal diagnosis but are clearly dying from the combined effect of multiple chronic illnesses and advanced age. Hospice provides comfort, support, and dignity for these patients who otherwise fall through the cracks of disease-specific criteria.",
     required:[
       "PPS or KPS ≤40% — predominantly bed or chair bound",
       "Profound weakness and fatigue — dependent for all or most ADLs",

     ],
