     ],
     alert:"The general debility LCD requires particularly strong narrative documentation. A clear picture of declining trajectory over time is essential for certification and recertification."},
  ];

  var openLCD=null;
  function renderLCDs(){
    Array.from(body.querySelectorAll(".lcd-card")).forEach(function(c){c.remove();});
    LCDs.forEach(function(lcd,i){
      var isOpen=openLCD===i;
      var card=div("r-card lcd-card","cursor:pointer;margin-bottom:8px;border-left:3px solid "+lcd.color+";");
      var hdr=div("","display:flex;align-items:center;gap:10px;");
      add(hdr,el("span",{style:"font-size:20px"},lcd.icon));
      var hi=div("","flex:1;");
      add(hi,el("div",{style:"font-size:15px;font-weight:700;color:var(--r-pri)"},lcd.title));
      add(hi,el("div",{style:"font-family:'DM Mono',monospace;font-size:11px;color:var(--r-muted);margin-top:2px"},lcd.ref));
      add(hdr,hi);
      add(hdr,el("span",{style:"color:var(--r-muted);font-size:16px"},isOpen?"▲":"▼"));
      add(card,hdr);

      if(isOpen){
        add(card,div("r-divider","margin:10px 0;"));

        // Why hospice
        var wh=div("r-card-teal r-card","margin-bottom:10px;padding:12px;border-radius:10px;");
        add(wh,el("div",{style:"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--r-teal);margin-bottom:5px"},"WHY HOSPICE FOR THIS DIAGNOSIS"));
        add(wh,el("div",{style:"font-size:13px;color:var(--r-sec);line-height:1.65"},lcd.whyHospice));
        add(card,wh);

        // Primary
        add(card,el("div",{style:"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(239,68,68,.8);margin-bottom:5px"},"PRIMARY CRITERION"));
        add(card,el("div",{style:"font-size:14px;font-weight:600;color:var(--r-pri);line-height:1.6;margin-bottom:10px"},lcd.primary));

        // Required
        add(card,el("div",{style:"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(239,68,68,.8);margin-bottom:6px"},"REQUIRED CLINICAL FINDINGS"));
        lcd.required.forEach(function(r){
          var row=div("","display:flex;gap:8px;margin-bottom:6px;");
          add(row,el("span",{style:"color:var(--r-red);flex-shrink:0;margin-top:1px"},"▸"));
          add(row,el("span",{style:"font-size:13px;color:var(--r-sec);line-height:1.55"},r));
          add(card,row);
        });

        // Comorbids
        add(card,el("div",{style:"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(59,130,246,.8);margin-top:10px;margin-bottom:5px"},lcd.comorbLabel.toUpperCase()));
        lcd.comorbids.forEach(function(c){
          var row=div("","display:flex;gap:8px;margin-bottom:6px;");
          add(row,el("span",{style:"color:var(--r-blue);flex-shrink:0;margin-top:1px"},"▸"));
          add(row,el("span",{style:"font-size:13px;color:var(--r-sec);line-height:1.55"},c));
          add(card,row);
        });

        // Documentation tips
        var dt=div("r-card-amber r-card","margin-top:10px;padding:12px;border-radius:10px;");
        add(dt,el("div",{style:"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--r-amber);margin-bottom:6px"},"DOCUMENTATION TIPS FOR NURSES"));
        lcd.docTips.forEach(function(tip){
          var row=div("","display:flex;gap:8px;margin-bottom:5px;");
          add(row,el("span",{style:"color:var(--r-amber);flex-shrink:0"},"•"));
          add(row,el("span",{style:"font-size:13px;color:var(--r-sec);line-height:1.55"},tip));
          add(dt,row);
        });
        add(card,dt);

        // Alert if present
        if(lcd.alert){
          var al=div("r-card-red r-card","margin-top:10px;padding:12px;border-radius:10px;");
          add(al,el("div",{style:"font-size:11px;font-weight:700;color:var(--r-red);margin-bottom:4px"},"⚠️ CLINICAL NOTE"));
          add(al,el("div",{style:"font-size:13px;color:var(--r-sec);line-height:1.6"},lcd.alert));
          add(card,al);
        }
      }

      card.onclick=function(){openLCD=isOpen?null:i;renderLCDs();};
      add(body,card);
    });
  }
  renderLCDs();
  add(page,body);
  add(page,rNav("rn-lcd"));
}

function renderRNPIRef(page){
  add(page,rTopBar("Pressure Injury Staging",false));
  var body=div("r-body");
  var stages=[
    {stage:"Stage 1",color:"var(--r-amber)",icon:"1",desc:"Non-blanchable erythema of intact skin. Area may be painful, firm, soft, warmer or cooler than adjacent tissue. May be difficult to detect in darkly pigmented skin.",action:"Reposition q2h. Moisture barrier. Pressure-redistributing surface. Document location and size.",nursing:"Intact skin — do NOT open or debride. Assess skin with each turn."},
    {stage:"Stage 2",color:"var(--r-amber)",icon:"2",desc:"Partial-thickness loss of skin with exposed dermis. Wound bed is viable, pink/red, moist. May present as intact or ruptured serum-filled blister. Adipose and deeper tissues are NOT visible.",action:"Moisture-retentive dressing (hydrocolloid, foam). Protect from friction. No wet-to-dry dressings.",nursing:"Slough NOT present in Stage 2 — if slough is present, reassign stage. Size: length x width in cm."},
    {stage:"Stage 3",color:"var(--r-red)",icon:"3",desc:"Full-thickness skin loss. Adipose (fat) IS visible. Granulation tissue and epibole (rolled wound edges) often present. Depth varies by anatomical location. Slough and/or eschar may be visible.",action:"Wound care consult. Wet-to-moist or moisture-retentive dressings. Debridement may be required. Nutritional consult.",nursing:"Undermining and tunneling must be measured and documented. Report depth in cm."},
    {stage:"Stage 4",color:"var(--r-red)",icon:"4",desc:"Full-thickness skin and tissue loss with exposed or directly palpable fascia, muscle, tendon, ligament, cartilage, or bone. Slough and/or eschar may be present.",action:"Immediate wound care consult and physician notification. Surgical evaluation often needed. Nutritional support essential. Pressure offloading.",nursing:"Stage 4 is a reportable event in most facilities. Document pain assessment. Assess for osteomyelitis risk."},
    {stage:"Unstageable",color:"var(--r-muted)",icon:"U",desc:"Full-thickness skin and tissue loss where the extent cannot be confirmed because it is obscured by slough or eschar. True depth unknown — could be Stage 3 or 4.",action:"Do NOT debride stable dry eschar on heels (acts as biological cover). Consult wound care for all other unstageable wounds.",nursing:"Once debrided, reassign appropriate stage. Document as 'Unstageable' until depth is determined."},
    {stage:"Deep Tissue Injury",color:"var(--r-purple)",icon:"DTI",desc:"Intact or non-intact skin with localized area of persistent non-blanchable deep red, maroon, or purple discoloration. May present as blood-filled blister. Discoloration may appear differently in darkly pigmented skin.",action:"Pressure offloading immediately. Do NOT massage area. Frequent reassessment — may evolve rapidly to Stage 3/4.",nursing:"DTI may evolve rapidly even with optimal care. Document evolution. Often occurs over bony prominences. Cannot predict final depth."},
    {stage:"Mucosal Membrane PI",color:"var(--r-blue)",icon:"MM",desc:"Found on mucous membranes with a history of a medical device in use at that location. Staging system does NOT apply to mucosal wounds.",action:"Remove or reposition device as tolerated. Consult wound care. Document medical device and location.",nursing:"Common locations: nares (NG/ETT), mouth (bite blocks), urethra (foley). Do not apply pressure injury stages to these wounds."},
  ];
  stages.forEach(function(s){
    var card=div("r-card fadeUp","margin-bottom:10px;border-left:3px solid "+s.color+";");
    var hdr=div("","display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;");
    var badge=div("","width:34px;height:34px;border-radius:8px;background:"+s.color+";display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0;font-family:'DM Mono',monospace;");
    badge.textContent=s.icon; add(hdr,badge);
    var ti=div("","flex:1;"); ti.innerHTML='<div style="font-size:19px;font-weight:700;color:var(--r-pri);margin-bottom:4px">'+s.stage+'</div>'; add(hdr,ti); add(card,hdr);
    var dl=div("r-label","margin-bottom:4px;"); dl.textContent="DEFINITION"; add(card,dl);
    var dd=div("","font-size:17px;color:var(--r-sec);line-height:1.65;margin-bottom:10px;"); dd.textContent=s.desc; add(card,dd);
    var al=div("r-label","color:rgba(13,148,136,.8);margin-bottom:4px;"); al.textContent="TREATMENT APPROACH"; add(card,al);
    var ad=div("","font-size:17px;color:var(--r-sec);line-height:1.65;margin-bottom:8px;"); ad.textContent=s.action; add(card,ad);
    var nl=div("r-label","color:rgba(245,158,11,.8);margin-bottom:4px;"); nl.textContent="NURSING DOCUMENTATION NOTE"; add(card,nl);
    var nd=div("","font-size:17px;color:var(--r-sec);line-height:1.65;"); nd.textContent=s.nursing; add(card,nd);
    add(body,card);
  });
  add(page,body);
  add(page,rNav("rn-piref"));
}

  var alCard=div("","background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:12px;");
  alCard.innerHTML='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(245,158,11,.9);margin-bottom:8px">⚠️ Allergies</div>'+S.patient.allergies.map(function(a){return '<div style="font-size:17px;font-weight:600;color:white;margin-bottom:4px">'+a+'</div>';}).join("");
  add(row,alCard);
  var dxCard=div("","background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:12px;padding:12px;");
  dxCard.innerHTML='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(59,130,246,.9);margin-bottom:8px">🏥 Conditions</div>'+S.patient.diagnoses.map(function(d){return '<div style="font-size:17px;font-weight:600;color:white;margin-bottom:4px">'+d+'</div>';}).join("");
  add(row,dxCard);
  add(content,row);
  // Medications
  var medCard=div("","background:rgba(13,148,136,.15);border:1px solid rgba(13,148,136,.3);border-radius:12px;padding:12px;margin-bottom:12px;");
  medCard.innerHTML='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(13,148,136,.9);margin-bottom:8px">💊 Current Medications</div>'+S.patient.medications.map(function(m){return '<div style="font-size:17px;color:rgba(255,255,255,.9);margin-bottom:5px;display:flex;gap:8px"><span style="color:rgba(13,148,136,.9);flex-shrink:0">•</span><span>'+m+'</span></div>';}).join("");
  add(content,medCard);
  // Emergency contacts
  if(S.patient.emergencyContacts&&S.patient.emergencyContacts[0]&&S.patient.emergencyContacts[0].name){
    var ecCard=div("","background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:12px;padding:12px;margin-bottom:12px;");
    ecCard.innerHTML='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(168,85,247,.9);margin-bottom:8px">📞 Emergency Contact</div>';
    S.patient.emergencyContacts.filter(function(c){return c.name;}).forEach(function(c){
      var row=div("","display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;");
      row.innerHTML='<div><div style="font-size:17px;font-weight:600;color:white">'+c.name+'</div><div style="font-size:15px;color:rgba(255,255,255,.6)">'+c.relation+'</div></div>';
      if(c.phone){
        var callBtn=el("a",{href:"tel:"+c.phone,style:"background:rgba(168,85,247,.4);border:1px solid rgba(168,85,247,.5);border-radius:8px;padding:6px 12px;font-size:17px;font-weight:700;color:white;text-decoration:none;"},["📞 "+c.phone]);
        add(row,callBtn);
      }
      add(ecCard,row);
    });
    add(content,ecCard);
  }
  // 911
  var callRow=div("","display:grid;grid-template-columns:1fr 1fr;gap:10px;");
  var call911=el("a",{href:"tel:911",style:"display:flex;align-items:center;justify-content:center;gap:8px;background:#DC2626;border-radius:12px;padding:14px;font-size:19px;font-weight:700;color:white;text-decoration:none;"},["🚨 Call 911"]);
  add(callRow,call911);
  var locBtn=btn("","Share Location",function(){
    if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(pos){alert("Lat: "+pos.coords.latitude.toFixed(4)+"\nLng: "+pos.coords.longitude.toFixed(4));});}
  });
  locBtn.style.cssText="display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(59,130,246,.3);border:1px solid rgba(59,130,246,.5);border-radius:12px;padding:14px;font-size:19px;font-weight:700;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;";
  locBtn.textContent="📍 Share Location";
  add(callRow,locBtn);
  add(content,callRow);
  add(body,content);
  add(page,body);
}

window.addEventListener("DOMContentLoaded",function(){
  // Check today symptom
  var today=new Date().toISOString().split("T")[0];
  S.fSymToday=S.fSymptoms.some(function(e){return e.date===today;});
  render();
});
</script>
