<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MedyCard Pro"/>
<title>MedyCard Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#app{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;}
button{cursor:pointer;font-family:inherit;-webkit-appearance:none;}
input,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;}
.scr{overflow-y:auto;-webkit-overflow-scrolling:touch;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bounce{0%,100%{transform:translateY(-25%);animation-timing-function:cubic-bezier(.8,0,1,1)}50%{transform:translateY(0);animation-timing-function:cubic-bezier(0,0,.2,1)}}
.pulse{animation:pulse 2s infinite;}
.bounce{animation:bounce .6s infinite;}
.inp{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 14px;font-size:14px;outline:none;color:#1c1c1e;}
.inp:focus{border-color:#007AFF;}
textarea.inp{resize:none;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
var LS={
  get:function(k,d){try{var v=localStorage.getItem("mc_"+k);return v!==null?JSON.parse(v):d;}catch(e){return d;}},
  set:function(k,v){try{localStorage.setItem("mc_"+k,JSON.stringify(v));}catch(e){}}
};

// ── AUTH ─────────────────────────────────────────────────────────────────────
function hashPIN(p){var h=0;for(var i=0;i<p.length;i++)h=(Math.imul(31,h)+p.charCodeAt(i))|0;return"mc_"+Math.abs(h).toString(36)+p.length;}
var AUTH={
  hasPin:function(){return!!localStorage.getItem("mc_pin");},
  save:function(p){localStorage.setItem("mc_pin",hashPIN(p));},
  check:function(p){return localStorage.getItem("mc_pin")===hashPIN(p);}
};

// ── STATE ────────────────────────────────────────────────────────────────────
var S={
  screen:"lock", // lock | setup | emergency | app
  page:"emergency",
  sm:LS.get("sm",false),
  travel:LS.get("travel",false),
  medications:LS.get("meds",[{id:"1",name:"Lisinopril",dosage:"10mg",frequency:"Once daily",status:"safe"}]),
  allergies:LS.get("allergies",["Penicillin","Peanuts"]),
  bloodType:LS.get("bt","O Positive"),
  history:LS.get("history","No major surgeries. Controlled hypertension."),
  contacts:LS.get("contacts",[{id:"1",name:"Jane Doe",rel:"Wife",phone:"+1 (555) 012-3456"},{id:"2",name:"Dr. Smith",rel:"Primary Physician",phone:"+1 (555) 987-6543"}]),
  apiKey:LS.get("apiKey",""),
  chatMsgs:{emergency:[],vault:[],check:[],family:[],travel:[]},
  chatInput:"",
  chatLoading:false,
  pinEntry:"",
  pinStep:1,
  pinFirst:"",
  pinError:"",
  isUnmasked:false,
  checkMeds:[],
  checkInput:"",
  newMed:{name:"",dosage:"",freq:""},
  newAllergy:"",
  isChatOpen:false,
  showApiKey:false
};

// Set initial screen
if(!AUTH.hasPin()) S.screen="setup";
else S.screen="lock";

// ── DRUG CHECK ───────────────────────────────────────────────────────────────
var DRUG_PAIRS=[["lisinopril","aspirin"],["warfarin","ibuprofen"],["metformin","contrast dye"],["ssri","tramadol"],["warfarin","aspirin"]];
function checkDrugs(meds){
  if(meds.length<2)return"none";
  var l=meds.map(function(m){return m.toLowerCase();});
  for(var i=0;i<DRUG_PAIRS.length;i++){
    var p=DRUG_PAIRS[i];
    if(l.indexOf(p[0])>=0&&l.indexOf(p[1])>=0)return"flag";
  }
  return"safe";
}

// ── AI ───────────────────────────────────────────────────────────────────────
var PROMPTS={
  emergency:"You are Medy, a health information companion in MedyCard Pro, designed by an RN with 30 years experience. If anyone describes chest pain, difficulty breathing, stroke symptoms, severe bleeding, or life-threatening emergency — first sentence must be 'Call 911 immediately.' NEVER diagnose. NEVER recommend prescription medications. Always end with recommending a doctor or 911 if urgent. Max 3-4 sentences.",
  vault:"You are Medy in MedyCard Pro. General medication info only. NEVER advise changing a prescription. Always end with 'Your pharmacist is the best resource.' Max 2-3 sentences.",
  check:"You are Medy in MedyCard Pro. General medication awareness only. Frame as public awareness, never clinical advice. Always end with 'Please speak with your pharmacist or doctor.' Max 3 sentences.",
  family:"You are Medy in MedyCard Pro. General caregiving tips only. Recommend professional medical guidance. 2-3 sentences.",
  travel:"You are Medy in MedyCard Pro. General travel health awareness only. For emergencies, first recommend local emergency services. Always recommend a travel medicine clinic before international travel. 3-4 sentences."
};

function addChat(ctx,role,content){
  if(!S.chatMsgs[ctx])S.chatMsgs[ctx]=[];
  S.chatMsgs[ctx].push({id:Date.now().toString(),role:role,content:content});
}

async function askMedy(ctx){
  var key=S.apiKey;
  if(!key){addChat(ctx,"ai","Please add your Anthropic API key in Settings (⚙️) to use Medy AI.");S.chatLoading=false;render();return;}
  var history=S.chatMsgs[ctx].map(function(m){return{role:m.role==="user"?"user":"assistant",content:m.content};});
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:PROMPTS[ctx]||PROMPTS.emergency,messages:history})
    });
    var data=await res.json();
    addChat(ctx,"ai",(data.content&&data.content[0])?data.content[0].text:"Sorry, I couldn't process that.");
  }catch(e){
    addChat(ctx,"ai","Couldn't reach Medy AI. Please check your API key in Settings.");
  }
  S.chatLoading=false;
  render();
}

function sendChat(ctx){
  if(!S.chatInput.trim()||S.chatLoading)return;
  addChat(ctx,"user",S.chatInput);
  S.chatInput="";
  S.chatLoading=true;
  render();
  askMedy(ctx);
}

// ── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag,props){
  var e=document.createElement(tag);
  if(props){
    Object.keys(props).forEach(function(k){
      if(k==="style")e.style.cssText=props[k];
      else if(k==="class")e.className=props[k];
      else if(k==="html")e.innerHTML=props[k];
      else if(k==="text")e.textContent=props[k];
      else if(k.indexOf("on")===0)e.addEventListener(k.slice(2).toLowerCase(),props[k]);
      else e.setAttribute(k,props[k]);
    });
  }
  return e;
}
function D(style){var e=document.createElement("div");if(style)e.style.cssText=style;return e;}
function ap(parent){for(var i=1;i<arguments.length;i++)if(arguments[i])parent.appendChild(arguments[i]);return parent;}

// ── SVG ICONS ────────────────────────────────────────────────────────────────
var SVG={
  heart:'<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',

  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',

  warn:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  credit:'<rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  history:'<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>',
  share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
  activity:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
  alert:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  plane:'<path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2c-.5.1-.9.5-.9 1L1 8.5c0 .6.4 1 1 1L7 10l-1.5 2.5L4 14.5c0 .5.5.9 1 .9H7l1.5 1.5L9 19c.1.5.5 1 1 1l1.2-.1c.5-.1.8-.5.8-1z"/>',
  nfc:'<path d="M6 8.32a7.43 7.43 0 0 1 0 7.36"/><path d="M9.46 6.21a11.76 11.76 0 0 1 0 11.58"/><path d="M12.91 4.1a15.91 15.91 0 0 1 .01 15.8"/><path d="M16.37 2a20.16 20.16 0 0 1 0 20"/>'
};
function svg(name,size,fill,stroke){
  var s=el("svg");
  s.setAttribute("width",size||16);s.setAttribute("height",size||16);s.setAttribute("viewBox","0 0 24 24");
  s.setAttribute("fill",fill||"none");
  s.setAttribute("stroke",stroke||"currentColor");
  s.setAttribute("stroke-width","2");
  s.innerHTML=SVG[name]||"";
  return s;
}

// ── PIN DOTS ─────────────────────────────────────────────────────────────────
function pinDots(filled){
  var row=D("display:flex;justify-content:center;gap:12px;margin-bottom:24px;");
  for(var i=0;i<6;i++){
    var d=D("width:16px;height:16px;border-radius:50%;transition:background .15s;background:"+(i<filled?"white":"rgba(255,255,255,.2)")+";");
    ap(row,d);
  }
  return row;
}

// ── KEYPAD ───────────────────────────────────────────────────────────────────
function keypad(onDigit,onBack){
  var grid=D("display:grid;grid-template-columns:repeat(3,1fr);gap:10px;");
  [1,2,3,4,5,6,7,8,9].forEach(function(k){
    var b=el("button",{style:"height:52px;border-radius:16px;font-size:20px;font-weight:900;color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);",text:String(k)});
    b.addEventListener("click",function(){onDigit(String(k));});
    ap(grid,b);
  });
  ap(grid,D()); // empty cell
  var z=el("button",{style:"height:52px;border-radius:16px;font-size:20px;font-weight:900;color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);",text:"0"});
  z.addEventListener("click",function(){onDigit("0");});
  var bk=el("button",{style:"height:52px;border-radius:16px;font-size:20px;font-weight:900;color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);",text:"⌫"});
  bk.addEventListener("click",onBack);
  ap(grid,z,bk);
  return grid;
}

// ── APP LOGO ─────────────────────────────────────────────────────────────────
function appLogo(){
  var wrap=D("display:flex;flex-direction:column;align-items:center;");
  var icon=D("width:64px;height:64px;background:#EF4444;border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 8px 24px rgba(239,68,68,.35);");
  icon.appendChild(svg("credit",32,"none","white"));
  var title=el("h1",{style:"color:white;font-size:28px;font-weight:900;margin-bottom:4px;",text:"MedyCard Pro"});
  ap(wrap,icon,title);
  return wrap;
}

// ── EMERGENCY BAR (on lock screen) ───────────────────────────────────────────
function emergencyBar(){
  // Single button — no nested divs to intercept taps
  var btn=document.createElement("button");
  btn.style.cssText="display:block;width:calc(100% - 32px);margin:16px 16px 0;border-radius:16px;background:#FF3B30;border:none;padding:0;box-shadow:0 4px 20px rgba(255,59,48,.5);flex-shrink:0;cursor:pointer;text-align:left;-webkit-appearance:none;";
  var line1=document.createElement("p");
  line1.style.cssText="color:white;font-size:17px;font-weight:900;margin-bottom:3px;";
  line1.textContent="\u{1F6A8} Emergency Medical ID";
  var line2=document.createElement("p");
  line2.style.cssText="color:rgba(255,255,255,.8);font-size:12px;font-weight:600;";
  line2.textContent="Tap for blood type, allergies & medications — no PIN needed";
  var inner=document.createElement("div");
  inner.style.cssText="padding:16px 18px;";
  inner.appendChild(line1);
  inner.appendChild(line2);
  btn.appendChild(inner);
  btn.addEventListener("click", function(){ S.screen="emergency"; render(); });
  return btn;
}

// ── SCREENS ──────────────────────────────────────────────────────────────────

function renderSetup(){
  var root=D("position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8);");
  var centerSetup=D("flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;");
  ap(centerSetup,appLogo());
  var sub=el("p",{style:"color:#93C5FD;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px;margin-top:4px;",text:"Set Up Your Security PIN"});
  ap(centerSetup,sub);
  var box=D("background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:28px;width:320px;text-align:center;");
  var lbl=el("p",{style:"color:white;font-weight:700;font-size:15px;margin-bottom:4px;"});
  var slbl=el("p",{style:"color:#93C5FD;font-size:13px;margin-bottom:20px;"});
  var errEl=el("p",{style:"color:#FCA5A5;font-size:13px;font-weight:600;margin-bottom:12px;display:none;"});
  function refresh(){
    lbl.textContent=S.pinStep===1?"Create a 6-digit PIN":"Confirm your PIN";
    slbl.textContent=S.pinStep===1?"You'll use this to unlock MedyCard Pro":"Enter the same PIN again";
    errEl.style.display=S.pinError?"block":"none";
    errEl.textContent=S.pinError||"";
  }
  refresh();
  var dotsWrap=D();
  function refreshDots(){dotsWrap.innerHTML="";ap(dotsWrap,pinDots(S.pinEntry.length));}
  refreshDots();
  var kp=keypad(function(d){
    S.pinEntry+=d;
    if(S.pinEntry.length===6){
      if(S.pinStep===1){S.pinFirst=S.pinEntry;S.pinStep=2;S.pinEntry="";}
      else if(S.pinEntry===S.pinFirst){AUTH.save(S.pinEntry);S.screen="app";S.pinEntry="";S.pinStep=1;S.pinFirst="";S.pinError="";render();return;}
      else{S.pinError="PINs don't match. Try again.";S.pinStep=1;S.pinEntry="";S.pinFirst="";}
    }
    refresh();refreshDots();
  },function(){S.pinEntry=S.pinEntry.slice(0,-1);refreshDots();});
  ap(box,errEl,lbl,slbl,dotsWrap,kp);
  ap(centerSetup,box);
  ap(root,centerSetup);
  document.getElementById("app").innerHTML="";
  document.getElementById("app").appendChild(root);
}

function renderLock(){
  var root=D("position:fixed;inset:0;display:flex;flex-direction:column;background:linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8);");

  // Emergency bar at top (below status bar)
  var topSpacer=D("height:env(safe-area-inset-top,20px);flex-shrink:0;");
  ap(root,topSpacer);
  ap(root,emergencyBar());

  // PIN area
  var center=D("flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;");
  ap(center,appLogo());
  var sub=el("p",{style:"color:#93C5FD;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px;margin-top:4px;",text:"Enter PIN to Unlock"});
  ap(center,sub);

  var box=D("background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:28px;width:320px;text-align:center;");
  var errEl=el("p",{style:"color:#FCA5A5;font-size:13px;font-weight:600;margin-bottom:12px;"+(S.pinError?"":"display:none;"),text:S.pinError||""});
  var dotsWrap=D();
  function refreshDots(){dotsWrap.innerHTML="";ap(dotsWrap,pinDots(S.pinEntry.length));}
  refreshDots();
  var kp=keypad(function(d){
    S.pinEntry+=d;
    if(S.pinEntry.length===6){
      if(AUTH.check(S.pinEntry)){S.screen="app";S.pinEntry="";S.pinError="";render();return;}
      else{S.pinError="Incorrect PIN. Try again.";S.pinEntry="";}
    }
    errEl.style.display=S.pinError?"block":"none";
    errEl.textContent=S.pinError||"";
    refreshDots();
  },function(){
    S.pinEntry=S.pinEntry.slice(0,-1);
    S.pinError="";
    errEl.style.display="none";
    refreshDots();
  });
  ap(box,errEl,dotsWrap,kp);
  ap(center,box);
  var note=el("p",{style:"color:rgba(147,197,253,.3);font-size:11px;margin-top:16px;",text:"Protected by local encryption · Auto-locks after 5 min"});
  ap(center,note);
  ap(root,center);

  document.getElementById("app").innerHTML="";
  document.getElementById("app").appendChild(root);
}

function renderEmergency(){
  var root=D("position:fixed;inset:0;background:#0a0a0a;overflow-y:auto;-webkit-overflow-scrolling:touch;");

  // Header
  var hdr=D("position:sticky;top:0;z-index:10;background:#FF3B30;padding:calc(12px + env(safe-area-inset-top,0px)) 20px 12px;");
  var hdrRow=D("display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;");
  var hdrLeft=D("display:flex;align-items:center;gap:8px;");
  ap(hdrLeft,svg("warn",22,"none","white"));
  hdrLeft.appendChild(el("span",{style:"color:white;font-size:20px;font-weight:900;",text:"MEDICAL ID"}));
  var closeBtn=el("button",{style:"background:rgba(255,255,255,.2);color:white;border:none;padding:7px 14px;border-radius:10px;font-weight:700;font-size:13px;",text:"✕ Close"});
  closeBtn.addEventListener("click",function(){S.screen="lock";render();});
  ap(hdrRow,hdrLeft,closeBtn);
  ap(hdr,hdrRow);
  var hdrSub=el("p",{style:"color:rgba(255,200,200,.9);font-size:11px;font-weight:600;",text:"Emergency access — no PIN required. Vault remains locked."});
  ap(hdr,hdrSub);
  ap(root,hdr);

  var body=D("padding:20px;");

  // No data warning
  var hasData=S.medications.length||S.allergies.length||(S.bloodType&&S.bloodType!=="O Positive"&&S.bloodType!=="");

    var hTop=D("display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;");
    var hLeft=D("display:flex;align-items:center;gap:8px;");
    var hIco=D("width:32px;height:32px;background:#EF4444;border-radius:10px;display:flex;align-items:center;justify-content:center;");
    ap(hIco,svg("credit",16,"none","white"));
    var hTitle=el("span",{style:"font-size:20px;font-weight:900;color:"+tc+";",text:"MedyCard Pro"});
    ap(hLeft,hIco,hTitle);
    var hRight=D("display:flex;gap:6px;");
    ap(hRight,settingsBtn(),lockBtn());
    ap(hTop,hLeft,hRight);ap(hdr,hTop);
    ap(hdr,secBadge(),modeBtns());
    var pt=el("h1",{style:"font-size:"+(S.sm?"28px":"22px")+";font-weight:900;color:"+tc+";margin-top:8px;letter-spacing:-.3px;",text:TITLES[S.page]||"MedyCard Pro"});
    ap(hdr,pt);
    ap(root,hdr);

    // Content
    var content=D();
    content.style.cssText="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));";
    if(S.page==="emergency")ap(content,pageEmergency());
    else if(S.page==="vault")ap(content,pageVault());
    else if(S.page==="check")ap(content,pageCheck());
    else if(S.page==="family")ap(content,pageFamily());
    else if(S.page==="travel")ap(content,pageTravel());
    ap(root,content);

    // Bottom nav
    var nav=D();
    nav.style.cssText="flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0px));background:"+(S.sm?"rgba(17,17,17,.97)":"rgba(249,249,249,.97)")+";border-top:1px solid "+bdr+";";
    PAGES.forEach(function(p){
      var active=S.page===p.id;
      var color=active?(S.sm?"#FFD600":"#007AFF"):(S.sm?"#666":"#8E8E93");
      var b=el("button",{style:"display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:14px;border:none;background:transparent;color:"+color+";min-width:"+(S.sm?"58px":"44px")+";"});
      ap(b,svg(p.icon,S.sm?28:22,active&&p.id==="emergency"?color:"none",color));
      ap(b,el("span",{style:"font-size:"+(S.sm?"12px":"10px")+";font-weight:"+(active?"700":"500")+";",text:p.label}));
      (function(pid){b.addEventListener("click",function(){S.page=pid;render();});})(p.id);
      ap(nav,b);
    });
    ap(root,nav);

    // Mobile chat overlay
    if(S.isChatOpen){
      var chatBg=D("position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.4);display:flex;flex-direction:column;justify-content:flex-end;");
      chatBg.addEventListener("click",function(){S.isChatOpen=false;render();});
      var sheet=D("background:white;border-radius:22px 22px 0 0;max-height:72vh;display:flex;flex-direction:column;");
      sheet.addEventListener("click",function(e){e.stopPropagation();});
      var handle=D("width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:10px auto 6px;");
      ap(sheet,handle,chatPanel(S.page));
      ap(chatBg,sheet);ap(root,chatBg);
    }

  } else {
    // Desktop sidebar
    var side=D("width:260px;display:flex;flex-direction:column;padding:20px;background:"+sbg+";border-right:1px solid "+bdr+";flex-shrink:0;overflow-y:auto;");
    var stop=D("display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;");
    var sLeft=D("display:flex;align-items:center;gap:10px;");
    var sIco=D("width:36px;height:36px;background:#EF4444;border-radius:12px;display:flex;align-items:center;justify-content:center;");
    ap(sIco,svg("credit",18,"none","white"));
    var sTxt=D();
    sTxt.innerHTML='<p style="font-size:18px;font-weight:900;color:'+tc+'">MedyCard Pro</p><p style="font-size:8px;font-weight:700;color:#007AFF;text-transform:uppercase;letter-spacing:.08em">Active Medical Guardian</p>';
    ap(sLeft,sIco,sTxt);ap(stop,sLeft,lockBtn());ap(side,stop);
    ap(side,modeBtns());
    ap(side,D("height:12px;"));
    ap(side,secBadge());
    ap(side,D("height:12px;"));
    var snav=D("display:flex;flex-direction:column;gap:4px;flex:1;");
    PAGES.forEach(function(p){
      var active=S.page===p.id;
      var b=el("button",{style:"display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border-radius:12px;border:none;background:"+(active?(S.sm?"#FFD600":"#007AFF"):"transparent")+";color:"+(active?(S.sm?"#000":"white"):(S.sm?"#888":"#6b7280"))+";font-size:14px;font-weight:600;"});
      ap(b,svg(p.icon,18,active?(S.sm?"#000":"white"):(S.sm?"#888":"#6b7280"),"none"));
      ap(b,el("span",{text:p.label}));
      (function(pid){b.addEventListener("click",function(){S.page=pid;render();});})(p.id);
      ap(snav,b);
    });
    ap(side,snav);
    ap(side,D("height:8px;"));
    ap(side,settingsBtn());
    ap(root,side);

    // Main
    var main=D("flex:1;display:flex;flex-direction:column;overflow:hidden;");
    var mhdr=D("padding:20px 28px;background:"+(S.sm?"#111":"white")+";border-bottom:1px solid "+bdr+";display:flex;align-items:center;justify-content:space-between;flex-shrink:0;");
    ap(mhdr,el("h1",{style:"font-size:"+(S.sm?"28px":"22px")+";font-weight:900;color:"+tc+";letter-spacing:-.2px;",text:TITLES[S.page]||"MedyCard Pro"}));
    if(S.page!=="travel"){
      var chatToggle=el("button",{style:"display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:12px;font-weight:900;color:white;border:none;background:"+(S.isChatOpen?"#5856D6":"linear-gradient(135deg,#007AFF,#5856D6)")+";font-size:13px;"});
      chatToggle.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+(S.isChatOpen?"Close Medy AI":"Ask Medy AI");
      chatToggle.addEventListener("click",function(){S.isChatOpen=!S.isChatOpen;render();});
      ap(mhdr,chatToggle);
    }
    ap(main,mhdr);
    var body=D("flex:1;display:flex;overflow:hidden;");
    var mc=D();mc.style.cssText="flex:1;overflow-y:auto;padding:24px 28px;-webkit-overflow-scrolling:touch;";
    if(S.page==="emergency")ap(mc,pageEmergency());
    else if(S.page==="vault")ap(mc,pageVault());
    else if(S.page==="check")ap(mc,pageCheck());
    else if(S.page==="family")ap(mc,pageFamily());
    else if(S.page==="travel")ap(mc,pageTravel());
    ap(body,mc);
    if(S.isChatOpen&&S.page!=="travel"){
      var cc2=D("width:300px;border-left:1px solid "+bdr+";padding:16px;display:flex;flex-direction:column;flex-shrink:0;background:"+sbg+";overflow:hidden;");
      ap(cc2,chatPanel(S.page));ap(body,cc2);
    }
    ap(main,body);ap(root,main);
  }

  if(S.showApiKey)ap(root,apiKeyModal());

  document.getElementById("app").innerHTML="";
  document.getElementById("app").appendChild(root);
}

// ── RENDER ROUTER ─────────────────────────────────────────────────────────────
function render(){
  if(S.screen==="setup")renderSetup();
  else if(S.screen==="emergency")renderEmergency();
  else if(S.screen==="lock")renderLock();
  else renderApp();
}

render();
window.addEventListener("resize",function(){
  if(S.screen==="app")renderApp();
});
</script>
</body>
</html>
