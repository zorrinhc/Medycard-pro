*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
button{cursor:pointer;font-family:inherit;border:none;-webkit-appearance:none;background:none;}
input,textarea,select{font-family:inherit;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.inp{width:100%;background:#2a2a2a;border:1.5px solid #3a3a3a;border-radius:12px;padding:14px 16px;font-size:23px;outline:none;color:white;}
.inp:focus{border-color:#007AFF;background:#222;}
textarea.inp{resize:none;}
select.inp{-webkit-appearance:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.pulse{animation:pulse 2s infinite;}
.fadeUp{animation:fadeUp .25s ease both;}

// ─── ICON ────────────────────────────────────────────────────────────────────
(function(){
  var c=document.createElement('canvas');
  c.width=512;c.height=512;
  var x=c.getContext('2d');

  function rr(ctx,rx,ry,rw,rh,rad){
    ctx.beginPath();
    ctx.moveTo(rx+rad,ry);
    ctx.lineTo(rx+rw-rad,ry);ctx.arcTo(rx+rw,ry,rx+rw,ry+rad,rad);
    ctx.lineTo(rx+rw,ry+rh-rad);ctx.arcTo(rx+rw,ry+rh,rx+rw-rad,ry+rh,rad);
    ctx.lineTo(rx+rad,ry+rh);ctx.arcTo(rx,ry+rh,rx,ry+rh-rad,rad);
    ctx.lineTo(rx,ry+rad);ctx.arcTo(rx,ry,rx+rad,ry,rad);
    ctx.closePath();
  }

  // Deep red gradient background
  var bg=x.createLinearGradient(0,0,512,512);
  bg.addColorStop(0,'#7F1D1D');
  bg.addColorStop(0.5,'#991B1B');
  bg.addColorStop(1,'#C8392B');
  x.fillStyle=bg;
  rr(x,0,0,512,512,100);
  x.fill();

  // Warm glow behind heart
  var glow=x.createRadialGradient(256,200,0,256,200,170);
  glow.addColorStop(0,'rgba(255,100,80,0.4)');
  glow.addColorStop(1,'rgba(255,100,80,0)');
  x.fillStyle=glow;
  x.beginPath();x.arc(256,200,170,0,Math.PI*2);x.fill();

  // Heart shape — centered and bold
  x.fillStyle='white';
  x.shadowColor='rgba(255,200,180,0.5)';
  x.shadowBlur=28;
  x.save();
  x.translate(256,215);
  x.scale(4.8,4.8);
  x.beginPath();
  x.moveTo(0,8);
  x.bezierCurveTo(-2,5,-7,0,-7,-4);
  x.bezierCurveTo(-7,-9,-2,-12,0,-9);
  x.bezierCurveTo(2,-12,7,-9,7,-4);
  x.bezierCurveTo(7,0,2,5,0,8);
  x.closePath();
  x.fill();
  x.restore();
  x.shadowBlur=0;

  // Separator
  x.strokeStyle='rgba(255,255,255,0.2)';
  x.lineWidth=2;
  x.beginPath();
  x.moveTo(156,335);x.lineTo(356,335);
  x.stroke();

  // App name
  x.font='700 68px -apple-system,Arial,sans-serif';
  x.fillStyle='rgba(255,255,255,0.95)';
  x.textAlign='center';
  x.textBaseline='middle';
  x.fillText('MedyCard',256,388);

  var dataUrl=c.toDataURL('image/png');
  var link=document.createElement('link');
  link.rel='icon';link.type='image/png';link.href=dataUrl;
  document.head.appendChild(link);
  var al=document.createElement('link');
  al.rel='apple-touch-icon';al.href=dataUrl;
  document.head.appendChild(al);
})();

// ─── STORAGE ─────────────────────────────────────────────────────────────────
var LS={
  get:function(k,d){try{var v=localStorage.getItem('mc_'+k);return v!==null?JSON.parse(v):d;}catch(e){return d;}},
  set:function(k,v){try{localStorage.setItem('mc_'+k,JSON.stringify(v));}catch(e){}}
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function hashPIN(p){var h=0;for(var i=0;i<p.length;i++)h=(Math.imul(31,h)+p.charCodeAt(i))|0;return'mc_'+Math.abs(h).toString(36)+p.length;}
var AUTH={
  has:function(){return!!localStorage.getItem('mc_pin');},
  save:function(p){localStorage.setItem('mc_pin',hashPIN(p));},
  check:function(p){return localStorage.getItem('mc_pin')===hashPIN(p);}
};

// ─── AUTO-LOCK ────────────────────────────────────────────────────────────────
var lockTimer=null;
function resetTimer(){
  if(lockTimer)clearTimeout(lockTimer);
  if(S&&S.screen==='app'){
    lockTimer=setTimeout(function(){S.screen='lock';S.pin='';LS.set('lastAccess',Date.now());render();},5*60*1000);
  }
}
['touchstart','click','keydown'].forEach(function(ev){document.addEventListener(ev,resetTimer,true);});

function div(css){var e=document.createElement('div');if(css)e.style.cssText=css;return e;}
function btn(label,css,fn){var b=document.createElement('button');b.style.cssText=css||'';if(typeof label==='string')b.textContent=label;else b.appendChild(label);b.addEventListener('click',fn);return b;}

function ap(p){for(var i=1;i<arguments.length;i++){if(arguments[i])p.appendChild(arguments[i]);}return p;}
function callLink(phone,css){

function fmtDate(d){if(!d)return'';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function fmtTime(t){if(!t)return'';try{var p=t.split(':'),h=parseInt(p[0]),m=p[1],ap2=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap2;}catch(e){return t;}}
function timeUntil(date){
  if(!date)return'';
  try{var diff=new Date(date+'T00:00:00')-Date.now()+86400000;var d=Math.floor(diff/86400000);if(d<=0)return'Today';if(d===1)return'Tomorrow';if(d<7)return'In '+d+' days';return'In '+Math.floor(d/7)+' wks';}catch(e){return'';}
}

var PAIRS=[['lisinopril','aspirin'],['warfarin','ibuprofen'],['warfarin','aspirin'],['ssri','tramadol']];
function drugFlag(names){
  var l=names.map(function(n){return n.toLowerCase();});
  for(var i=0;i<PAIRS.length;i++){var p=PAIRS[i];if(l.some(function(x){return x.indexOf(p[0])>=0;})&&l.some(function(x){return x.indexOf(p[1])>=0;}))return true;}
  return false;
}

var AI_SYS={
  emergency:'You are Medy, a health companion. For emergencies: say Call 911 first. Never diagnose. Max 3 sentences.',
  vault:'You are Medy. General medication info only. End with: Your pharmacist is the best resource. Max 2 sentences.',
  appointments:'You are Medy. Help with appointment prep. Max 3 sentences.',
  family:'You are Medy. General caregiving tips. 2-3 sentences.',

function addMsg(ctx,role,text){if(!S.chats[ctx])S.chats[ctx]=[];S.chats[ctx].push({id:Date.now()+'',role:role,text:text});}
async function sendChat(ctx){
  var txt=S.chatInput.trim();if(!txt||S.chatLoading)return;
  addMsg(ctx,'user',txt);S.chatInput='';S.chatLoading=true;render();
  if(!S.apiKey){addMsg(ctx,'ai','Add your Anthropic API key in Settings to enable Medy AI.');S.chatLoading=false;render();return;}
  try{
    var msgs=S.chats[ctx].map(function(m){return{role:m.role==='user'?'user':'assistant',content:m.text};});
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:AI_SYS[ctx]||AI_SYS.emergency,messages:msgs})});
    var data=await res.json();
    addMsg(ctx,'ai',(data.content&&data.content[0])?data.content[0].text:'Sorry, could not process that.');
  }catch(e){addMsg(ctx,'ai','Could not reach Medy AI. Check your API key.');}
  S.chatLoading=false;render();
}

function shareLocation(){
  if(!navigator.geolocation){alert('Location not available. Enable location access in Settings.');return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    var url='https://maps.google.com/?q='+pos.coords.latitude.toFixed(5)+','+pos.coords.longitude.toFixed(5);
    var msg='EMERGENCY — My location: '+url;
    if(navigator.share){navigator.share({title:'Emergency Location',text:msg});}
    else{window.open('sms:?body='+encodeURIComponent(msg),'_top');}
  },function(){alert('Could not get location. Please enable location access.');});
}

function detectEmergencyNum(labelEl,numEl,linkEl){
  var numMap={us:'911',gb:'999',au:'000',ca:'911',jp:'119','in':'112',mx:'911',de:'112',fr:'15',it:'118',es:'112',cn:'120',kr:'119',za:'10177'};
  var cntMap={us:'🇺🇸 USA',gb:'🇬🇧 UK',au:'🇦🇺 Australia',ca:'🇨🇦 Canada',jp:'🇯🇵 Japan','in':'🇮🇳 India',mx:'🇲🇽 Mexico',de:'🇩🇪 Germany',fr:'🇫🇷 France',it:'🇮🇹 Italy',es:'🇪🇸 Spain',cn:'🇨🇳 China',kr:'🇰🇷 S. Korea',za:'🇿🇦 S. Africa'};
  function setDefault(){labelEl.textContent='📍 International Default';numEl.textContent='112';linkEl.href='tel:112';}
  if(!navigator.geolocation){setDefault();return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+pos.coords.latitude+'&lon='+pos.coords.longitude+'&format=json')
      .then(function(r){return r.json();})
      .then(function(d){
        var cc=(d.address&&d.address.country_code)||'';
        var num=numMap[cc]||'112';
        var country=cntMap[cc]||'Your Location';
        labelEl.textContent='📍 '+country;
        numEl.textContent=num;
        linkEl.href='tel:'+num;
      }).catch(setDefault);
  },setDefault,{timeout:5000});
}

    var av=div('width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#60A5FA,#1D4ED8);display:flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:900;flex-shrink:0;');
    av.textContent=ct.name[0];
    var nfo=div('flex:1;');ap(nfo,el('p','font-weight:700;color:white;font-size:24px;',ct.name));ap(nfo,el('p','color:#9CA3AF;font-size:20px;',ct.rel+' · '+ct.phone));
    var btns2=div('display:flex;gap:6px;');
    var cBtn=callLink(ct.phone,'width:38px;height:38px;border-radius:50%;background:#34C759;display:flex;align-items:center;justify-content:center;');
    cBtn.innerHTML=ico(IC.phone,15,'white','none');
    var sBtn=btn('','width:38px;height:38px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;',function(){if(navigator.share)navigator.share({title:ct.name,text:'Emergency contact: '+ct.name+' ('+ct.rel+') '+ct.phone});});
    sBtn.innerHTML=ico(IC.share,14,'none','#3B82F6');
    ap(btns2,cBtn,sBtn);ap(row,av,nfo,btns2);ap(contCard,row);
  });
  ap(c,contCard);

  return c;
}

function pageTravel(){
  var c=div('');
  var hero=div('border-radius:20px;padding:18px;background:linear-gradient(135deg,#0f172a,#1d4ed8);margin-bottom:18px;');
  ap(hero,el('p','color:white;font-weight:900;font-size:22px;margin-bottom:4px;','✈️ Travel Health Guard'));
  ap(hero,el('p','color:#93C5FD;font-size:20px;line-height:1.6;','Emergency numbers and health tips for international travel.'));
  ap(c,hero);
  var twBox=div('border-radius:16px;overflow:hidden;margin-bottom:18px;background:#1e1e1e;border:1px solid #2e2e2e;');
  var twHB=div('background:linear-gradient(90deg,#0f172a,#1d4ed8);padding:12px 16px;display:flex;align-items:center;gap:8px;');
  twHB.innerHTML=ico(IC.globe,18,'none','#93C5FD')+'<span style="color:white;font-weight:900;font-size:20px;margin-left:6px;">Emergency Numbers</span>';
  ap(twBox,twHB);
  var detRowB=div('padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2e2e2e;');
  var detLB=div('');
  var detLblB=el('p','color:#64748B;font-size:16px;font-weight:600;margin-bottom:6px;','📍 Detecting location…');
  var detNumB=el('p','color:white;font-size:36px;font-weight:900;line-height:1;','—');
  ap(detLB,detLblB,detNumB);
  var detLinkB=callLink('112','display:flex;align-items:center;gap:8px;background:#FF3B30;color:white;padding:14px 22px;border-radius:14px;font-size:20px;font-weight:900;box-shadow:0 4px 16px rgba(255,59,48,.35);');
  detLinkB.innerHTML=ico(IC.phone,20,'white','none')+' Call';
  ap(detRowB,detLB,detLinkB);
  ap(twBox,detRowB);
  detectEmergencyNum(detLblB,detNumB,detLinkB);
  var twExpB=false;
  var togBtnB=btn('','width:100%;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;background:transparent;border-top:1px solid #2e2e2e;',function(){
    twExpB=!twExpB;otherListB.style.display=twExpB?'block':'none';togArrowB.textContent=twExpB?'▲':'▼';
  });
  togBtnB.innerHTML='<span style="color:#60A5FA;font-size:16px;font-weight:700;">🌍 Other countries</span><span style="color:#64748B;font-size:16px;">▼</span>';
  var togArrowB=togBtnB.querySelector('span:last-child');
  var otherListB=div('display:none;');
  [['🇺🇸 USA','911'],['🇬🇧 UK','999'],['🇪🇺 Europe','112'],['🇯🇵 Japan','119'],['🇦🇺 Australia','000'],['🇨🇦 Canada','911'],['🇮🇳 India','112'],['🇲🇽 Mexico','911'],['🇩🇪 Germany','112'],['🇫🇷 France','15'],['🇮🇹 Italy','118'],['🇪🇸 Spain','112'],['🇨🇳 China','120'],['🇰🇷 S. Korea','119'],['🇿🇦 S. Africa','10177']].forEach(function(r){
    var rw=div('display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid #2e2e2e;');
    ap(rw,el('span','color:#e2e8f0;font-size:18px;',r[0]));
    var ca=callLink(r[1],'color:#007AFF;font-size:22px;font-weight:900;');ca.textContent=r[1];
    ap(rw,ca);ap(otherListB,rw);
  });
  ap(twBox,togBtnB,otherListB);ap(c,twBox);
  ap(c,el('p','font-size:16px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;','💬 Medy AI Travel Assistant'));
  ap(c,chatPanel('travel'));
  return c;
}

// ─── RENDER APP ───────────────────────────────────────────────────────────────
function renderApp(){
  var bg=S.senior?'#1a1a1a':'#F0F4F8';
  var tc=S.senior?'white':'#1c1c1e';
  var navBg=S.senior?'rgba(10,10,10,.97)':'rgba(249,249,249,.97)';
  var navBorder=S.senior?'#333':'#d1d5db';
  var sz='18px';

  var root=div('position:fixed;inset:0;display:flex;flex-direction:column;background:'+bg+';');

  // ── HEADER ──
  var TITLES_MAP={emergency:'Medical ID',vault:'Secure Vault',appointments:'Appointments',journal:'Health Journal',travel:'Travel Guard',family:'Family & Contacts'};
  var pageTitle=TITLES_MAP[S.page]||'MedyCard Pro';
  var hdr=div('background:'+(S.senior?'#111':'#1a1a1a')+';padding:calc(12px + env(safe-area-inset-top,0px)) 16px 12px;flex-shrink:0;border-bottom:1px solid #2e2e2e;display:flex;align-items:center;gap:12px;');
  // Left: back arrow OR logo
  if(S.pageHistory.length>0){
    var backBtn=btn('','width:38px;height:38px;border-radius:12px;background:#2a2a2a;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:20px;color:#aaa;flex-shrink:0;',function(){S.page=S.pageHistory.pop();S.isUnmasked=false;render();});
    backBtn.innerHTML='&#8592;';
    ap(hdr,backBtn);
  } else {
    var hico=div('width:38px;height:38px;background:#EF4444;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;');
    hico.innerHTML=ico(IC.heart,18,'none','white');
    ap(hdr,hico);
  }
  // Center: page title
  ap(hdr,el('span','flex:1;font-size:'+(S.senior?'22px':'19px')+';font-weight:800;color:white;letter-spacing:-.2px;',pageTitle));
  // Right: lock only
  var lockBtn=btn('','width:38px;height:38px;border-radius:12px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;',function(){LS.set('lastAccess',Date.now());S.screen='lock';S.pin='';if(lockTimer)clearTimeout(lockTimer);render();});
  lockBtn.innerHTML=ico(IC.lock,18,'none','#EF4444');
  ap(hdr,lockBtn);
  ap(root,hdr);

  // ── CONTENT ──
  var content=div('flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px;padding-bottom:calc(90px + env(safe-area-inset-bottom,0px));');
  if(S.page==='emergency')ap(content,pageID());
  else if(S.page==='vault')ap(content,pageVault());
  else if(S.page==='appointments')ap(content,pageAppts());
  else if(S.page==='family')ap(content,pageFamily());
  else if(S.page==='journal')ap(content,pageJournal());
  else if(S.page==='travel')ap(content,pageTravel());
  ap(root,content);

  // ── BOTTOM NAV ──
  var nav=div('position:fixed;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-around;padding:12px 4px calc(16px + env(safe-area-inset-bottom,0px));background:'+navBg+';border-top:2px solid '+navBorder+';');
  TABS.forEach(function(t){
    var active=S.page===t.id;
    var color=active?(S.senior?'#FFD600':'#EF4444'):(S.senior?'#666':'#555');
    var b=btn('','display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 10px;border-radius:12px;background:'+(active?'rgba(0,122,255,.1)':'transparent')+';color:'+color+';min-width:58px;',function(){});
    b.innerHTML=ico(t.ic,30,'none',color)+'<span style="font-size:16px;font-weight:700;color:'+color+';">'+t.label+'</span>';
    (function(tid){b.addEventListener('click',function(){if(S.page!==tid)S.pageHistory.push(S.page);S.page=tid;S.isUnmasked=false;render();});})(t.id);
    ap(nav,b);
  });
  ap(root,nav);

  if(S.showSettings)ap(root,settingsSheet());
  if(S.showHealthCard)ap(root,healthCardModal());
  document.getElementById('app').innerHTML='';ap(document.getElementById('app'),root);
  resetTimer();
}

// ─── RENDER ROUTER ────────────────────────────────────────────────────────────
function render(){
  try{
    if(S.screen==='onboard')renderOnboard();
    else if(S.screen==='setup')renderSetup();
    else if(S.screen==='emergency')renderEmergency();
    else if(S.screen==='lock')renderLock();
    else renderApp();
  }catch(err){
    console.error('MedyCard render error:',err);
    document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;"><p style="font-size:24px;font-weight:700;color:#EF4444;">⚠️ Display Error</p><p style="color:#6b7280;margin-top:8px;font-size:20px;">'+err.message+'</p><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#007AFF;color:white;border:none;border-radius:12px;font-size:22px;font-weight:700;">Reload App</button></div>';
  }
}

window.addEventListener('resize',function(){if(S.screen==='app')render();});
render();
</script>
