<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Memory Care"/>
<title>Memory Care Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#2F5D9E;--sky:#AFCFF7;--skyBg:#EEF4FF;--sand:#F2EDE4;
  --white:#FFFFFF;--amber:#FFB85C;--amberBg:#FFF8EE;
  --coral:#F28C8C;--coralBg:#FFF1F1;--green:#7BC47F;--greenBg:#F0FFF4;
  --pri:#1A1A2E;--sec:#6B7280;--border:rgba(175,207,247,0.35);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:"Source Sans 3",sans-serif;background:var(--sand);}
#app{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:var(--sat);padding-bottom:calc(80px + var(--sab));}
.page-white{background:var(--white);}
.page-dark{background:#0D1B2A;}

/* topbar */
.topbar{background:var(--white);box-shadow:0 1px 8px rgba(47,93,158,.1);
  padding:calc(12px + var(--sat)) 16px 12px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.topbar-dark{background:#162032!important;box-shadow:0 1px 12px rgba(0,0,0,.4)!important;}
.topbar h1{flex:1;font-family:"Lora",serif;font-size:18px;font-weight:700;
  color:var(--pri);text-align:center;}
.topbar-dark h1{color:#e8f0ff;}
.btn-icon{background:none;border:none;font-size:22px;cursor:pointer;
  padding:4px 8px;min-width:36px;}
.btn-icon-dk{color:#AFCFF7;}

/* cards */
.card{background:var(--white);border-radius:20px;padding:20px;
  box-shadow:0 4px 18px rgba(47,93,158,.08);border:1px solid var(--border);
  margin-bottom:12px;}
.card-dark{background:#1E2E42;border-radius:16px;padding:18px;
  border:1px solid rgba(175,207,247,.1);margin-bottom:12px;}

/* buttons */
.btn-primary{display:block;width:100%;padding:15px;border-radius:50px;
  background:var(--blue);color:#fff;font-size:18px;font-weight:600;
  font-family:"Source Sans 3",sans-serif;border:none;cursor:pointer;
  text-align:center;}
.btn-secondary{display:block;width:100%;padding:15px;border-radius:50px;
  background:transparent;color:var(--blue);font-size:18px;font-weight:600;
  font-family:"Source Sans 3",sans-serif;border:2px solid var(--blue);cursor:pointer;
  text-align:center;}
.btn-ghost{display:block;width:100%;padding:15px;border-radius:50px;
  background:rgba(175,207,247,.15);color:#AFCFF7;font-size:18px;font-weight:600;
  font-family:"Source Sans 3",sans-serif;border:1.5px solid rgba(175,207,247,.3);
  cursor:pointer;text-align:center;}
button:disabled{opacity:.4;cursor:not-allowed;}

/* answer cards */
.ans{background:var(--white);border-radius:16px;padding:16px 18px;
  border:1.5px solid var(--border);margin-bottom:10px;
  display:flex;align-items:center;gap:14px;cursor:pointer;}
.ans.picked{border-color:var(--blue);background:var(--skyBg);}
.ans-radio{width:22px;height:22px;border-radius:50%;border:2px solid #D1D5DB;
  flex-shrink:0;}
.ans.picked .ans-radio{background:var(--blue);border-color:var(--blue);}

/* tabs */
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:var(--white);border-bottom:1px solid var(--border);}
.tabs-dark{background:#162032!important;border-bottom:1px solid rgba(175,207,247,.15)!important;}
.tab{flex:0 0 auto;padding:12px 14px;font-size:16px;font-weight:600;
  color:var(--sec);border:none;background:none;cursor:pointer;
  white-space:nowrap;border-bottom:3px solid transparent;
  font-family:"Source Sans 3",sans-serif;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.tab-dark{color:rgba(175,207,247,.5);}
.tab-dark.on{color:#AFCFF7;border-bottom-color:#AFCFF7;}

/* progress */
.prog-wrap{padding:0 16px 10px;}
.prog-bar{height:5px;border-radius:3px;background:var(--sky);overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s;}

/* LCD / clinical */
.lsec{background:#192840;border-radius:14px;padding:16px;
  border:1px solid rgba(175,207,247,.1);margin-bottom:12px;}
.lsec-req{border:1.5px solid rgba(242,140,140,.3);}
.lsec-pri{border:1.5px solid rgba(176,48,48,.5);}
.l-ref{font-size:14px;font-weight:700;color:rgba(175,207,247,.5);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.l-title{font-size:18px;font-weight:700;color:#e8f0ff;
  font-family:"Lora",serif;margin-bottom:12px;}
.l-item{display:flex;gap:9px;padding:8px 0;
  border-bottom:1px solid rgba(175,207,247,.07);}
.l-item:last-child{border-bottom:none;}
.l-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:8px;}
.l-dot-blue{background:#AFCFF7;}
.l-dot-red{background:#F28C8C;}
.l-dot-green{background:#7BC47F;}
.l-text{font-size:16px;color:rgba(255,255,255,.8);line-height:1.55;}
.l-note{background:rgba(47,93,158,.25);border:1px solid rgba(175,207,247,.2);
  border-radius:10px;padding:12px;margin-top:10px;}
.l-note p{font-size:16px;color:#AFCFF7;line-height:1.6;}
.l-warn{background:rgba(242,140,140,.1);border:1px solid rgba(242,140,140,.25);
  border-radius:10px;padding:12px;margin-top:10px;}
.l-warn p{font-size:16px;color:#F28C8C;line-height:1.6;}
.badge-hosp{display:inline-block;font-size:13px;font-weight:700;
  background:rgba(255,184,92,.2);color:#FFB85C;border-radius:4px;
  padding:1px 6px;margin-left:6px;vertical-align:middle;}
.badge-prim{display:inline-block;font-size:13px;font-weight:700;
  background:rgba(176,48,48,.3);color:#ff8f8f;border-radius:4px;
  padding:1px 6px;margin-left:6px;vertical-align:middle;}

/* table */
.scl{width:100%;border-collapse:collapse;font-size:15px;}
.scl th{background:rgba(47,93,158,.4);color:#AFCFF7;padding:8px 6px;
  text-align:left;font-size:14px;text-transform:uppercase;letter-spacing:.05em;}
.scl td{padding:9px 6px;border-bottom:1px solid rgba(175,207,247,.07);
  color:rgba(255,255,255,.8);vertical-align:top;line-height:1.45;}
.scl tr.hl td{background:rgba(255,184,92,.07);}
.scl tr.hg td{background:rgba(242,140,140,.07);}

/* elig */
.elig-met{background:#0D2A1A;border:1.5px solid var(--green);border-radius:12px;
  padding:14px;margin-bottom:10px;}
.elig-unmet{background:#2A0D0D;border:1.5px solid var(--coral);border-radius:12px;
  padding:14px;margin-bottom:10px;}
.elig-neutral{background:#192840;border:1.5px solid rgba(175,207,247,.2);
  border-radius:12px;padding:14px;margin-bottom:10px;}

/* overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(26,26,46,.6);
  display:flex;align-items:flex-end;}
.sheet{background:var(--white);border-radius:22px 22px 0 0;
  padding:16px 22px calc(30px + var(--sab));
  max-height:78vh;overflow-y:auto;width:100%;}

/* misc */
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--skyBg);
  border:1px solid var(--sky);border-radius:50px;padding:5px 12px;
  font-size:15px;font-weight:700;color:var(--blue);}
.score-row{display:flex;gap:8px;}
.score-box{flex:1;background:#1E2E42;border-radius:12px;padding:14px 8px;
  text-align:center;border:1px solid rgba(175,207,247,.1);}
.score-num{font-size:22px;font-weight:700;font-family:"Lora",serif;color:#fff;}
.score-lbl{font-size:13px;color:rgba(175,207,247,.55);font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

input[type=text],textarea{
  width:100%;padding:16px;font-size:19px;
  font-family:"Source Sans 3",sans-serif;
  background:var(--white);border:2px solid #E5E7EB;
  border-radius:14px;outline:none;color:var(--pri);}
input[type=text]:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:none;font-size:17px;}

input[type=range]{-webkit-appearance:none;width:100%;height:8px;
  border-radius:4px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:28px;height:28px;border-radius:50%;
  background:var(--blue);border:3px solid #fff;
  box-shadow:0 2px 8px rgba(47,93,158,.35);cursor:grab;}

.p{padding:16px 16px 0;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.mb24{margin-bottom:24px;}
.clbl{font-size:14px;font-weight:700;color:#AFCFF7;text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:6px;}
.clbl-amber{color:#FFB85C!important;}

/* fade-in animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .3s ease both;}
.fu1{animation-delay:.05s}.fu2{animation-delay:.1s}.fu3{animation-delay:.15s}
.fu4{animation-delay:.2s}.fu5{animation-delay:.25s}.fu6{animation-delay:.3s}
</style>
</head>

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";

  var page=document.createElement("div");
  page.className="page";

  if(S.screen==="mode-select"){renderModeSelect(page);}
  else if(S.mode==="family"){renderFamily(page);}
  else if(S.mode==="caregiver"){renderCaregiver(page);}
  else if(S.mode==="provider"){renderProvider(page);}
  else{renderModeSelect(page);}

  app.appendChild(page);

  if(S.explain!==null){
    var ov=document.createElement("div");
    ov.className="overlay";
    ov.onclick=function(){S.explain=null;render();};
    renderExplainSheet(ov);
    app.appendChild(ov);
  }
}

function H(tag,props,html){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="class")e.className=props[k];
    else if(k==="style")e.style.cssText=props[k];
    else if(k==="onclick")e.onclick=props[k];
    else if(k==="oninput")e.oninput=props[k];
    else if(k==="onkeydown")e.onkeydown=props[k];
    else if(k==="disabled")e.disabled=props[k];
    else if(k==="type")e.type=props[k];
    else if(k==="value")e.value=props[k];
    else if(k==="min")e.min=props[k];
    else if(k==="max")e.max=props[k];
    else if(k==="step")e.step=props[k];
    else if(k==="placeholder")e.placeholder=props[k];
    else if(k==="rows")e.rows=props[k];
    else e.setAttribute(k,props[k]);
  });
  if(html!==undefined)e.innerHTML=html;
  return e;
}

function D(cls,styleOrChildren){

      tr.innerHTML='<td style="font-weight:700;color:'+(row.pct<=40?"#F28C8C":row.pct<=50?"#FFB85C":"#AFCFF7")+'">'+row.pct+'%</td><td>'+row.amb+'</td><td>'+row.act+'</td><td>'+row.sc+'</td><td>'+row.intake+'</td><td>'+row.con+'</td>';
      add(tbody,tr);
    });
    add(tbl,tbody);add(wrap,tbl);add(body,wrap);
  }
  else if(S.scaleTab===2){
    add(body,H("div",{class:"clbl","style":"margin-bottom:6px"},"NYHA Functional Classification"));
    var nnote=D("l-note","margin-bottom:12px");nnote.innerHTML='<p>NYHA Class IV is required for Cardiac Disease Hospice LCD. Class III may qualify with documented rapid progression and declined interventions.</p>';add(body,nnote);
    NYHA_DATA.forEach(function(n){
      var card=D("lsec"+(n.hospice?" lsec-req":""),"margin-bottom:8px");
      var hdr=D("","display:flex;align-items:center;gap:10px;margin-bottom:8px");
      hdr.innerHTML='<div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;border:2px solid '+n.color+';color:'+n.color+';flex-shrink:0;font-family:Lora,serif">'+n.cls+'</div><div style="font-size:17px;font-weight:700;font-family:Lora,serif;color:'+n.color+'">'+n.label+'</div>'+(n.hospice?'<span class="badge-hosp">LCD</span>':"");
      add(card,hdr);
      card.innerHTML+=('<p style="font-size:16px;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:6px">'+n.desc+'</p><div style="background:#162032;border-radius:8px;padding:10px"><p style="font-size:15px;color:rgba(175,207,247,.6);line-height:1.6;font-style:italic">'+n.detail+'</p></div>');
      add(body,card);
    });
  }
  else if(S.scaleTab===3){
    add(body,H("div",{class:"clbl","style":"margin-bottom:6px"},"Katz Index of Independence in ADL (1963)"));
    var knote=D("l-note","margin-bottom:12px");knote.innerHTML='<p>Scored 0–6. Dependence in 3+ ADLs supports functional decline LCD. ADL loss follows retrogenesis: bathing → dressing → toileting → transfer → continence → feeding.</p>';add(body,knote);
    KATZ_DATA.forEach(function(k,i){
      var card=D("lsec","margin-bottom:8px");
      card.innerHTML='<div style="font-size:17px;font-weight:700;color:#AFCFF7;font-family:Lora,serif;margin-bottom:10px">ADL '+(i+1)+': '+k.item+'</div>';
      var gr=D("","display:grid;grid-template-columns:1fr 1fr;gap:8px");
      var indBox=D("","background:#0D2A1A;border-radius:10px;padding:11px");
      indBox.innerHTML='<div style="font-size:13px;font-weight:700;color:#7BC47F;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Independent</div><p style="font-size:15px;color:rgba(255,255,255,.8);line-height:1.5">'+k.indep+'</p>';
      var depBox=D("","background:#2A0D0D;border-radius:10px;padding:11px");
      depBox.innerHTML='<div style="font-size:13px;font-weight:700;color:#F28C8C;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Dependent</div><p style="font-size:15px;color:rgba(255,255,255,.8);line-height:1.5">'+k.dep+'</p>';
      add(gr,indBox,depBox);add(card,gr);add(body,card);
    });
  }
  else if(S.scaleTab===4){
    add(body,H("div",{class:"clbl","style":"margin-bottom:6px"},"Lawton-Brody IADL Scale (1969)"));
    var lnote=D("l-note","margin-bottom:12px");lnote.innerHTML='<p>IADL decline typically precedes ADL loss and correlates with FAST Stages 3–5. Score 0–8. Decrement indicates increasing dependence and disease progression.</p>';add(body,lnote);
    LAWTON_DATA.forEach(function(l,i){
      var card=D("lsec","margin-bottom:8px");
      card.innerHTML='<div style="font-size:17px;font-weight:700;color:#AFCFF7;font-family:Lora,serif;margin-bottom:8px">IADL '+(i+1)+': '+l.item+'</div>';
      l.levels.forEach(function(lv,li){
        var row=D("","display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(175,207,247,.06)");
        var sc=li===0?1:li===l.levels.length-1?0:"-";
        row.innerHTML='<div style="font-size:16px;font-weight:700;color:'+(li===0?"#7BC47F":li===l.levels.length-1?"#F28C8C":"#FFB85C")+';min-width:18px">'+sc+'</div><p style="font-size:16px;color:rgba(255,255,255,.8);line-height:1.5">'+lv+'</p>';
        add(card,row);
      });
      add(body,card);
    });
  }
  add(page,body);
}
function renderICD10(page){
  add(page,topBar("ICD-10 Codes",true,true,null));
  var body=D("p");
  var note=D("card-dark","border:1px solid rgba(255,184,92,.25);margin-bottom:14px");
  note.innerHTML='<div class="clbl clbl-amber">Key Clinical Point</div><p style="font-size:16px;color:rgba(255,255,255,.85);line-height:1.7;margin-bottom:8px">Medicare has <strong style="color:#fff">no fixed list</strong> of approved hospice diagnoses. Any ICD-10 code qualifies if the clinical picture supports ≤6 month prognosis with dual physician certification.</p><p style="font-size:16px;color:rgba(175,207,247,.55);line-height:1.6">The codes below are commonly used but are not exhaustive. Secondary diagnoses are critical — they tell the clinical story of why the terminal condition is fatal in this patient.</p>';
  add(body,note);
  var wrap=D("","overflow-x:auto");
  var tbl=document.createElement("table");tbl.className="scl";
  tbl.innerHTML='<thead><tr><th>Code</th><th>Description</th></tr></thead>';
  var tbody=document.createElement("tbody");
  ICD10_DATA.forEach(function(row){
    var tr=document.createElement("tr");
    tr.innerHTML='<td style="font-weight:700;color:#AFCFF7;white-space:nowrap">'+row[0]+'</td><td>'+row[1]+'</td>';
    add(tbody,tr);
  });
  add(tbl,tbody);add(wrap,tbl);add(body,wrap);
  add(body,D("lsec","margin-top:12px;border:1px solid rgba(175,207,247,.12)",[H("div",{class:"clbl"},"Documentation Requirements"),H("p",{style:"font-size:16px;color:rgba(255,255,255,.75);line-height:1.65;margin-top:6px"},"A hospice claim requires: (1) Primary terminal diagnosis ICD-10 code, (2) Related secondary diagnoses supporting prognosis, (3) Physician narrative explaining why prognosis is ≤6 months. The narrative is critical — it tells the clinical story that the code alone cannot.")]));
  add(page,body);
}
function renderExport(page){
  add(page,topBar("Clinical Export",true,true,null));
  var body=D("p");
  if(!Object.keys(S.iadlAns).length){
    var empty=D("card-dark","text-align:center;padding:32px 20px");
    empty.innerHTML='<div style="font-size:38px;margin-bottom:10px">📄</div><div style="font-size:18px;font-weight:600;color:#fff;margin-bottom:6px">No Data to Export</div><p style="font-size:16px;color:rgba(175,207,247,.55);line-height:1.6">Complete an assessment first.</p>';
    add(body,empty,D("","height:12px",[pillBtn("Run Assessment →",function(){go("name");},"ghost")]));
    add(page,body);return;
  }
  var fast=FAST_SIMPLE[S.fastStg-1]||FAST_SIMPLE[3];
  var today=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  var adlNames=Object.keys(S.adlAns).filter(function(k){return S.adlAns[k]>0;}).map(function(k){var q=ADL_Q.find(function(q){return q.id===k;});return q?q.cat:null;}).filter(Boolean);
  var lines=["FUNCTIONAL STATUS SUMMARY","RN Referral Network — Memory Care Companion","","Patient: "+nm(),"Date: "+today,"","─── CLINICAL SCORES ───","FAST Stage: "+fast.s+" — "+fast.label,"Palliative Performance Scale: "+S.pps+"%","Lawton-Brody IADL: "+iadlTotal().toFixed(1)+" / 8.0","Katz ADL Dependence: "+adlDepCount()+" of 6","","─── FAST CLINICAL DETAIL ───",fast.clin,"","─── ADL NEEDS ───",adlNames.length?"Needs support with: "+adlNames.join(", "):"Independent in all ADLs"];
  if(S.flags.length)lines=lines.concat(["","─── SAFETY FLAGS ───",S.flags.map(function(f){return f.label;}).join(", ")]);
  lines=lines.concat(["","─── LCD SCREENING ───","FAST ≥7: "+(S.fastStg>=7?"MET":"Not met — Stage "+S.fastStg),"PPS ≤50%: "+(S.pps<=50?"MET":"Not met — "+S.pps+"%"),"ADL Dependence ≥3: "+(adlDepCount()>=3?"MET":"Not met — "+adlDepCount()+"/3"),"","Note: Any terminal diagnosis with ≤6 month prognosis may qualify.","LCDs are guidance only. Dual physician certification required.","","Generated by RN Referral Network Memory Care Companion"]);
  var box=D("","background:#162032;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid rgba(175,207,247,.12)");
  var pre=document.createElement("pre");pre.style.cssText="font-size:15px;color:rgba(255,255,255,.8);line-height:1.7;white-space:pre-wrap;word-break:break-word;font-family:'Source Sans 3',sans-serif";pre.textContent=lines.join("\n");
  add(box,pre);add(body,box);
  add(body,pillBtn("Copy to Clipboard",function(){if(navigator.clipboard){navigator.clipboard.writeText(lines.join("\n")).then(function(){alert("Copied to clipboard!");}).catch(function(){alert("Select and copy the text above manually.");});}else{alert("Select and copy the text above manually.");}},"ghost"));
  add(body,H("p",{style:"font-size:14px;color:rgba(175,207,247,.3);line-height:1.6;margin-top:12px;margin-bottom:20px"},"For clinical communication only. Not a medical record. Verify all data before clinical use."));
  add(page,body);
}

// ── EXPLAIN DRAWER ─────────────────────────────────────────────────────────
var EXPLAINS={
  home:{t:"What is this app?",f:"This app helps you understand what's changing and what to expect. It asks gentle questions and gives you a clear picture — no medical background needed.",c:"RN-guided functional assessment: Lawton-Brody IADL, FAST (Reisberg 1988), PPS v2 (Victoria Hospice), Katz ADL, NYHA cardiac classification."},
  iadl:{t:"Daily Activities (IADL)",f:"These are everyday tasks like managing medications, handling money, or making meals. We're checking how much help is needed — there are no wrong answers.",c:"Lawton-Brody IADL Scale (1969). 8-item scale scored 0–8. Independent=1, Assisted=0.5, Dependent=0. Decline correlates with FAST Stages 3–5."},
  fast:{t:"Memory Stages (FAST)",f:"Think of this like a map. It helps us understand where someone is in their memory journey so we can plan the right care.",c:"Functional Assessment Staging Tool (Reisberg, 1988). 7 stages, 16 substages. Stage 7A (≤6 words/day) is the primary Dementia LCD hospice threshold."},
  pps:{t:"Functional Reserve (PPS)",f:"This helps us understand how much energy and physical ability your loved one has for daily life right now.",c:"Palliative Performance Scale v2 (Victoria Hospice, 1996). 10 levels (10–100%). PPS ≤50% supports hospice eligibility under functional decline LCD."},
  nyha:{t:"Heart Function (NYHA)",f:"Heart and breathing health can affect memory and energy. This helps us get a complete picture.",c:"NYHA Functional Classification. Class I–IV. Class IV (symptoms at rest) is required for Cardiac Disease Hospice LCD."},
  adl:{t:"Personal Care (ADL)",f:"These are basic self-care tasks — bathing, dressing, eating. We're checking which ones are still independent.",c:"Katz Index of Independence in ADL (Katz, 1963). 6-item scale. Dependence in 3+ ADLs supports functional decline LCD."},
  safety:{t:"Safety Screening",f:"Some everyday situations carry extra risk as memory changes. This helps us spot anything that needs attention.",c:"Safety domains: stove use, medication self-management, driving risk, elopement/wandering, emergency contact readiness, isolation risk."},
  profile:{t:"Profile Card",f:"This is your summary — everything in one place you can share with a doctor.",c:"Composite functional profile: FAST, PPS, IADL, ADL, safety flags. Designed for care planning and clinical handoff documentation."},
  eligibility:{t:"Hospice Eligibility",f:"This checks whether someone may qualify for hospice care based on their current condition. Hospice focuses on comfort and quality of life.",c:"Medicare has NO fixed list of approved diagnoses. ANY terminal condition qualifies if prognosis ≤6 months. LCDs provide guidance for common conditions — they are not a closed list. Ref: 42 CFR §418, CMS IOM Pub. 100-02 Ch. 9."},
  lcd:{t:"Local Coverage Determinations",f:"These are Medicare's clinical guidelines for common terminal conditions. They help doctors document why someone qualifies for hospice.",c:"LCDs are guidance, not an exhaustive list. Any ICD-10 can be used if clinical picture supports ≤6 month prognosis with dual physician certification. MACs publish regional LCDs."}
};
function explainFloat(topic){
  var b=document.createElement("button");
  b.className="";
  b.style.cssText="position:fixed;bottom:calc(24px + var(--sab));left:50%;transform:translateX(-50%);z-index:50;white-space:nowrap;background:var(--white);color:var(--blue);border:1.5px solid var(--blue);border-radius:50px;padding:10px 22px;font-size:16px;font-weight:600;font-family:'Source Sans 3',sans-serif;box-shadow:0 4px 18px rgba(47,93,158,.18);cursor:pointer";
  b.textContent="💬 Explain This to Me";
  b.onclick=function(){S.explain=topic;render();};
  return b;
}
function renderExplainSheet(ov){
  var ex=EXPLAINS[S.explain]||EXPLAINS.home;
  var sheet=D("sheet");
  sheet.onclick=function(e){e.stopPropagation();};
  var handle=D("","width:38px;height:4px;border-radius:2px;background:#E0E0E0;margin:0 auto 18px");
  var title=H("h2",{style:"font-size:22px;font-weight:700;color:var(--pri);font-family:Lora,serif;margin-bottom:12px"},"💬 "+ex.t);
  var family=P("",ex.f,"font-size:18px;color:var(--pri);line-height:1.75;margin-bottom:18px");
  var divider=D("","border-top:1px solid #F0F0F0;padding-top:14px;margin-bottom:16px");
  var clinBtn=H("button",{onclick:function(){S.clinOpen=!S.clinOpen;render();},style:"display:flex;align-items:center;gap:8px;font-size:16px;color:var(--blue);font-weight:600;background:none;border:none;cursor:pointer;font-family:'Source Sans 3',sans-serif"},"");
  clinBtn.innerHTML='<span style="transition:transform .2s;display:inline-block;transform:'+(S.clinOpen?"rotate(90deg)":"none")+'">▶</span> 🩺 For Nurses &amp; Providers';
  add(divider,clinBtn);
  if(S.clinOpen){var clinText=P("",ex.c,"font-size:16px;color:var(--sec);line-height:1.65;background:var(--skyBg);padding:12px 14px;border-radius:10px;margin-top:10px");add(divider,clinText);}
  var closeBtn=H("button",{onclick:function(){S.explain=null;render();},class:"btn-primary"},"Got It ✓");
  add(sheet,handle,title,family,divider,closeBtn);
  add(ov,sheet);
}

// ── ANSWER HANDLERS ────────────────────────────────────────────────────────
function answerIadl(idx){
  var q=IADL_Q[S.iadlIdx];
  S.iadlAns[q.id]=idx;
  if(S.iadlIdx<IADL_Q.length-1){S.iadlIdx++;render();}
  else{
    var ia=Object.values(S.iadlAns).reduce(function(a,v){return a+iadlSc(v);},0);
    S.fastStg=ia>=7?2:ia>=5?3:ia>=3?4:ia>=1?5:6;
    go("fast");
  }
}
function answerAdl(idx){
  var q=ADL_Q[S.adlIdx];
  S.adlAns[q.id]=idx;
  if(S.adlIdx<ADL_Q.length-1){S.adlIdx++;render();}
  else{
    var ia=Object.values(S.iadlAns).reduce(function(a,v){return a+iadlSc(v);},0);
    var ad=Object.values(S.adlAns).reduce(function(a,v){return a+adlSc(v);},0);
    S.fastStg=calcFAST(ia,ad);
    go("safety");
  }
}

// ── BOOT ───────────────────────────────────────────────────────────────────
render();
